@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap');

/* ──────────────────────────────────────────────
   AP PRED — All styles strictly scoped to .ap-pred
   Does NOT affect header.php or footer.php
   ────────────────────────────────────────────── */
.ap-pred {
    --c-ink:     #0f2926;
    --c-primary: #46e5d5;
    --c-primary-d: #30a398;
    --c-accent:  #F59E0B;
    --c-accent-d:#D97706;
    --c-success: #10B981;
    --c-surface: #f4fbfa;
    --c-card:    #FFFFFF;
    --c-muted:   #64748B;
    --c-border:  #e2f0ef;
    --c-text:    #1e3b38;
    --font-head: 'Outfit', 'Space Grotesk', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    font-family: var(--font-body);
    color: var(--c-text);
}

/* ── BREADCRUMB ────────────────────────────── */
.ap-pred__breadcrumb {
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    padding: 0.6rem 0;
    font-size: 0.8rem;
    color: var(--c-muted);
}
.ap-pred__breadcrumb a {
    color: var(--c-primary);
    text-decoration: none;
}
.ap-pred__breadcrumb a:hover { text-decoration: underline; }
.ap-pred__breadcrumb span { margin: 0 0.4rem; color: var(--c-border); }

/* ── HERO ──────────────────────────────────── */
.ap-pred__hero {
    background: var(--c-ink);
    position: relative;
    padding: 3rem 0 4rem;
    overflow: visible; /* allow TomSelect dropdown to escape */
}
.ap-pred__hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(70,229,213,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(245,158,11,0.18) 0%, transparent 70%);
    pointer-events: none;
}
.ap-pred__hero-inner {
    position: relative;
    z-index: 2;
}

/* Trust bar */
.ap-pred__trust-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem 1rem;
    margin-bottom: 1.5rem;
}
.ap-pred__trust-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 0.3rem 0.9rem;
    font-size: 0.78rem;
    font-family: var(--font-body);
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
}
.ap-pred__trust-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;

.ap-pred__form-wrap {

.ap-pred__form-card {

.ap-pred__form-section {

.ap-pred__step-label {

.ap-pred__step-num {

    color: var(--c-muted);

    align-items: flex-start;
    gap: 1.2rem;
}

    border-radius: 50%;
    background: var(--c-primary);
    color: #fff;
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(70,229,213,0.3);

    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--c-ink);
    margin-bottom: 0.3rem;
}
.ap-pred__step-card p {
    font-size: 0.85rem;
    color: var(--c-muted);
    line-height: 1.6;
    margin: 0;
}
.ap-pred__connector {

    height: 32px;
    background: var(--c-border);
    margin: 0.4rem 0 0.4rem 23px;

    text-align: center;
}

    font-family: var(--font-head);
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.5rem;
}
.ap-pred__data-strip p {
    color: rgba(255,255,255,0.65);
    font-size: 0.9rem;
    margin-bottom: 1.4rem;
}
.ap-pred__data-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
}
.ap-pred__data-tag {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    font-size: 0.8rem;
    padding: 0.35rem 0.85rem;
    border-radius: 100px;

/* ── FAQ ───────────────────────────────────── */
.ap-pred__faq {
    background: var(--c-surface);
    padding: 4rem 0;
}
.ap-pred__faq-item {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 12px;
    margin-bottom: 0.75rem;
    overflow: hidden;
}
.ap-pred__faq-q {
    width: 100%;
    background: none;
    border: none;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    cursor: pointer;
    text-align: left;
    font-family: var(--font-head);
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--c-ink);

.ap-pred__faq-a {

    padding: 0 1.25rem 1rem;
    font-size: 0.87rem;
    color: var(--c-muted);
    line-height: 1.7;
    border-top: 1px solid var(--c-border);
    margin-top: -1px;

/* ── TOMSELECT DROPDOWN FIX ─────────────────
   Ensure the TomSelect dropdown is always fully visible
   (overriding any inherited overflow constraints)
   ────────────────────────────────────────── */
.ap-pred .ts-dropdown {
    z-index: 9999 !important;
}

/* ── MOBILE ────────────────────────────────── */
@media (max-width: 768px) {
    .ap-pred__hero { padding: 2rem 0 3rem; }
    .ap-pred__stat { min-width: 90px; padding: 0.6rem 0.8rem; }
    .ap-pred__form-body { padding: 1.1rem; }
    .ap-pred__trust-bar { gap: 0.4rem 0.8rem; }
    .ap-pred__stats { gap: 0.4rem; }
    .ap-pred__hero-title { text-align: center; }
    .ap-pred__hero-sub { text-align: center; }

#ev-footer {
  --evf-bg:      #072b27;
  --evf-bg2:     #0d4b45;
  --evf-text:    rgba(255,255,255,.5);
  --evf-head:    #ffffff;
  --evf-link:    rgba(255,255,255,.55);
  --evf-accent:  #00c6b8;
  --evf-gold:    #f59e0b;
  --evf-border:  rgba(255,255,255,.07);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
 
#ev-footer .evf-wrap {
  background: var(--evf-bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% 0%, rgba(0,198,184,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5% 100%, rgba(14,138,126,.25) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
  padding: 5rem 0 0;
}
 
/* Decorative line at top */
#ev-footer .evf-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,198,184,.4), rgba(14,138,126,.4), transparent);
}
 
/* Top grid */
#ev-footer .evf-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  position: relative;
  z-index: 1;
}
@media (max-width: 991px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
}
@media (max-width: 575px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr; gap: 1.75rem; }
}
 
/* Brand */
#ev-footer .evf-brand {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Sora', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--evf-head);
  text-decoration: none;
  margin-bottom: .75rem;
  transition: opacity .2s;
}
#ev-footer .evf-brand:hover { opacity: .85; }
#ev-footer .evf-brand-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--evf-accent), #08b2a1);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
 
#ev-footer .evf-tagline {
  font-size: .9rem; line-height: 1.7;
  color: var(--evf-text);
  margin-bottom: 1.5rem;
  max-width: 280px;
}
 
/* Trust badge */
#ev-footer .evf-trust {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--evf-border);
  border-radius: 100px;
  padding: .5rem 1.1rem;
  text-decoration: none;
  font-size: .8rem; font-weight: 600;
  color: var(--evf-text);
  transition: border-color .2s, color .2s, background .2s;
  margin-bottom: .75rem;
}
#ev-footer .evf-trust:hover {
  border-color: var(--evf-accent);
  color: var(--evf-accent);
  background: rgba(0,198,184,.05);
}
#ev-footer .evf-trust-dot {
  width: 8px; height: 8px;
  background: #10b981;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.2);
  animation: evfPulse 2.5s infinite;
}
@keyframes evfPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.2); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,.08); }
}
 
/* Column heading */
#ev-footer .evf-col-head {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--evf-accent);
  margin-bottom: 1.2rem;
}
 
/* Link list */
#ev-footer .evf-list { list-style: none; padding: 0; margin: 0; }
#ev-footer .evf-list li { margin-bottom: .6rem; }
#ev-footer .evf-link {
  display: inline-flex; align-items: center; gap: .5rem;
  color: var(--evf-link);
  text-decoration: none;
  font-size: .9rem; font-weight: 500;
  transition: color .18s, gap .18s;
}
#ev-footer .evf-link i {
  font-size: .65rem; color: var(--evf-accent);

}
#ev-footer .evf-link:hover { color: #fff; gap: .65rem; }

/* Divider */
#ev-footer .evf-hr {
  border: none;
  border-top: 1px solid var(--evf-border);
  margin: 3rem 0 1.5rem;
  position: relative;
  z-index: 1;
}
 
/* Bottom bar */
#ev-footer .evf-bottom {
  display: flex; align-items: center;
  justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;

#ev-footer .evf-copy {
  font-size: .85rem; color: var(--evf-text); margin: 0;
}
#ev-footer .evf-copy a { color: var(--evf-accent); text-decoration: none; }
#ev-footer .evf-copy a:hover { text-decoration: underline; }
 
#ev-footer .evf-credits {
  display: flex; align-items: center; gap: .65rem;

}
#ev-footer .evf-credits a { color: rgba(255,255,255,.42); text-decoration: none; transition: color .2s; }
#ev-footer .evf-credits a:hover { color: #fff; }



/*
 * ── Scroll-to-top: ALL tokens scoped to the component ─────────────────────
 *    No :root — safe to include this file multiple times without polluting
 *    any other stylesheet on the page.
 * ──────────────────────────────────────────────────────────────────────────
 */

.edu-scroll-to-top {

    /* Token layer — scoped here, naturally inherited by child elements */
    --_bg:            #ffffff;
    --_bg-hover:      #00b3a1;
    --_icon-color:    #444444;
    --_icon-hover:    #ffffff;
    --_size:          44px;
    --_shadow:        0 2px 8px rgba(0, 0, 0, 0.18);
    --_shadow-hover:  0 6px 18px rgba(0,179,161, 0.32);
    --_dur:           0.28s;
    --_spring:        cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    position:         fixed;
    bottom:           24px;
    right:            24px;
    width:            var(--_size);
    height:           var(--_size);
    padding:          0;
    border:           none;
    border-radius:    50%;
    cursor:           pointer;
    overflow:         hidden;               /* clip the ripple */
    z-index:          1000;

    display:          flex;
    align-items:      center;
    justify-content:  center;

    background-color: var(--_bg);
    box-shadow:       var(--_shadow);
    color:            inherit;              /* don't bleed into surrounding text */

    /* Hidden by default — fade + spring-scale in when .visible is added */
    opacity:          0;
    pointer-events:   none;
    transform:        translateY(14px) scale(0.88);
    transition:
        opacity          var(--_dur) ease,
        transform        var(--_dur) var(--_spring),
        background-color var(--_dur) ease,
        box-shadow       var(--_dur) ease;
}

/* ── Visible state ───────────────────────────────────────────────────────── */

.edu-scroll-to-top.visible {
    opacity:        1;
    pointer-events: auto;
    transform:      translateY(0) scale(1);
}

/* ── Hover ───────────────────────────────────────────────────────────────── */

.edu-scroll-to-top:hover {
    background-color: var(--_bg-hover);
    box-shadow:       var(--_shadow-hover);
    transform:        translateY(-3px) scale(1.06);
}

/* ── Active / pressed ────────────────────────────────────────────────────── */

.edu-scroll-to-top:active {
    transform:        translateY(0) scale(0.95);
    box-shadow:       var(--_shadow);
    transition-duration: 0.08s;
}

/* ── Keyboard focus ──────────────────────────────────────────────────────── */

.edu-scroll-to-top:focus-visible {
    outline:        3px solid var(--_bg-hover);
    outline-offset: 3px;
}

/* ── CSS chevron (no emoji, consistent cross-browser) ────────────────────── */

.edu-scroll-icon {
    display:      block;
    flex-shrink:  0;
    width:        10px;
    height:       10px;
    border-left:  2.5px solid var(--_icon-color);
    border-top:   2.5px solid var(--_icon-color);
    border-radius: 1px;
    transform:    rotate(45deg) translate(2px, 2px);
    transition:   border-color var(--_dur) ease;
}

.edu-scroll-to-top:hover .edu-scroll-icon {
    border-color: var(--_icon-hover);
}

/* ── Click ripple ────────────────────────────────────────────────────────── */

.edu-scroll-ripple {
    position:      absolute;
    border-radius: 50%;
    background:    rgba(255, 255, 255, 0.38);
    pointer-events:none;
    transform:     scale(0);
    animation:     edu-ripple-grow 0.52s linear forwards;
}

@keyframes edu-ripple-grow {
    to { transform: scale(4); opacity: 0; }
}

/* ── Responsive ──────────────────────────────────────────────────────────── */

@media (max-width: 768px) {
    .edu-scroll-to-top {
        --_size: 38px;
        bottom: 16px;
        right:  16px;
    }

    .edu-scroll-icon {
        width:  9px;
        height: 9px;
    }
}

/* ── Honour reduced-motion preferences ───────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
    .edu-scroll-to-top {
        transition:       opacity 0.15s ease;
        /* freeze all transforms to a single state so nothing bounces */
        transform:        none !important;
    }

    .edu-scroll-to-top.visible {
        transform:  none !important;
    }

    .edu-scroll-ripple {
        display: none; /* skip the ripple for motion-sensitive users */
    }
}
