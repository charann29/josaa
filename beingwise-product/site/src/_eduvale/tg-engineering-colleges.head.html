/* ---- Root tokens ---------------------------------------------------- */
#tgec {
  --p0: #002824;
  --p1: #00433c;
  --p2: #00675d;
  --p3: #009485;
  --p4: #c7f1ed;

  --goldb: #fdf3d0;
  --goldd: #7a5800;

  --amber:  #c97a00;
  --amberb: #fff7e6;
  --amberd: #7c4a00;

  --red:   #c0392b;
  --redb:  #fdecea;

  --blue:  #1adbc8;
  --blueb: #ebfffd;

  --green: #0b6e4f;
  --greenb:#d1fae5;

  --purp:  #28d9c7;
  --purpb: #e9fefc;

  --ink:   #0e1e1c;
  --ink2:  #1e3f3c;
  --muted: #445a5e;
  --muted2:#6b8589;

  --bdr:   #d4e6e4;
  --bdr2:  #b8d4d1;
  --bg:    #f4fcfb;
  --bg2:   #ecf6f5;
  --surf:  #ffffff;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --sh-xs: 0 1px 3px rgba(0,44,40,.07), 0 1px 2px rgba(0,44,40,.04);
  --sh-sm: 0 2px 8px rgba(0,44,40,.09), 0 1px 3px rgba(0,44,40,.05);
  --sh-md: 0 6px 20px rgba(0,44,40,.11), 0 2px 6px rgba(0,44,40,.06);
  --sh-lg: 0 20px 50px rgba(0,0,0,.14), 0 6px 18px rgba(0,0,0,.08);

  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  background: var(--bg);
}

/* ---- Util ----------------------------------------------------------- */
#tgec .tgec-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.25rem;
}
#tgec .tgec-skip {
  position: absolute;
  left: -9999px;
}
#tgec .tgec-skip:focus {
  left: 0; top: 0; z-index: 9999;
  padding: 8px 18px;
  background: var(--p2);
  color: #fff;
  font-size: 0.875rem;
  font-family: 'Outfit', sans-serif;
}

/* ---- HERO ----------------------------------------------------------- */
#tgec .tgec-hero {
  background:
    radial-gradient(ellipse 70% 90% at 100% 0%, rgba(0,148,133,.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(0,103,93,.25) 0%, transparent 55%),
    linear-gradient(145deg, #00201d 0%, #003832 45%, #005a51 100%);
  padding: 2.5rem 0 3.5rem;
  position: relative;
  overflow: hidden;
}
#tgec .tgec-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}
#tgec .tgec-hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--p3) 30%, #5eead4 50%, var(--p3) 70%, transparent 100%);
}

/* Breadcrumb */
#tgec .tgec-breadcrumb {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap; margin-bottom: 1.5rem;
}
#tgec .tgec-breadcrumb a {
  color: rgba(255,255,255,.55); font-size: .8rem; text-decoration: none;
  transition: color .2s;
}
#tgec .tgec-breadcrumb a:hover { color: rgba(255,255,255,.9); }
#tgec .tgec-breadcrumb svg { color: rgba(255,255,255,.25); flex-shrink: 0; }
#tgec .tgec-breadcrumb span { color: rgba(255,255,255,.85); font-size: .8rem; }

/* Hero body */
#tgec .tgec-hero-body {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 2rem;
  align-items: center;
}
#tgec .tgec-chips {
  display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .85rem;
}
#tgec .tgec-chip {
  display: inline-flex; align-items: center;
  padding: 3px 12px; border-radius: 9999px;
  font-size: .73rem; font-weight: 600; letter-spacing: .04em;
  background: rgba(255,255,255,.12); color: rgba(255,255,255,.9);
  border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(8px);
}
#tgec .tgec-chip--outline {
  background: transparent; border-style: dashed; color: rgba(255,255,255,.65);
}
#tgec .tgec-chip--cache {
  background: rgba(94,234,212,.15); color: #5eead4;
  border-color: rgba(94,234,212,.3);
}

#tgec .tgec-hero-text h1 {
  font-size: 2.2rem; font-weight: 900; line-height: 1.15;
  letter-spacing: -.03em; color: #fff; margin: 0 0 .85rem;
}
#tgec .tgec-hero-branch {
  color: #5eead4; display: block;
}
#tgec .tgec-hero-sub {
  color: rgba(255,255,255,.65); font-size: .92rem;
  line-height: 1.6; margin: 0 0 1.5rem; max-width: 520px;
}
#tgec .tgec-hero-sub strong { color: rgba(255,255,255,.9); }

#tgec .tgec-hero-cta {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: 8px 20px;
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.22);
  border-radius: 9999px;
  color: #fff; font-size: .85rem; font-weight: 600;
  text-decoration: none; transition: all .2s;
  backdrop-filter: blur(12px);
}
#tgec .tgec-hero-cta:hover {
  background: rgba(255,255,255,.2); transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.2);
}

/* Stat card */
#tgec .tgec-stat-card {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-lg);
  padding: 1rem 1.25rem;
  backdrop-filter: blur(20px);
}
#tgec .tgec-stat-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: .4rem 0;
}
#tgec .tgec-stat-sep {
  height: 1px; background: rgba(255,255,255,.09);
}
#tgec .tgec-stat-label { color: rgba(255,255,255,.5); font-size: .78rem; }
#tgec .tgec-stat-val {
  color: rgba(255,255,255,.92); font-weight: 700;
  font-size: .85rem; font-variant-numeric: tabular-nums;
}

/* ---- PAGE BODY ------------------------------------------------------ */
#tgec .tgec-body { padding-bottom: 3rem; }

/* ---- SELECTOR CARD -------------------------------------------------- */
#tgec .tgec-selector-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-xl);
  padding: 1.25rem 1.5rem;
  margin: 1.5rem 0 1.25rem;
  box-shadow: var(--sh-md);
}
#tgec .tgec-selector-head {
  display: flex; align-items: flex-start; gap: .75rem;
  margin-bottom: 1rem;
}
#tgec .tgec-selector-head svg {
  color: var(--p2); flex-shrink: 0; margin-top: 2px;
}
#tgec .tgec-selector-head h2 {
  font-size: 1rem; font-weight: 700; color: var(--ink); margin: 0 0 .2rem;
}
#tgec .tgec-selector-head p {
  font-size: .8rem; color: var(--muted); margin: 0;
}

/* ---- CUSTOM SELECT -------------------------------------------------- */
#tgec .tgec-select { position: relative; }

#tgec .tgec-select__btn {
  width: 100%;
  display: flex; align-items: center; gap: .75rem;
  padding: .75rem 1rem;
  background: var(--surf);
  border: 2px solid var(--bdr2);
  border-radius: var(--r-md);
  cursor: pointer; text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: .9rem; color: var(--ink);
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--sh-xs);
}
#tgec .tgec-select__btn:hover,
#tgec .tgec-select[aria-expanded="true"] .tgec-select__btn {
  border-color: var(--p2);
  box-shadow: 0 0 0 3px rgba(0,103,93,.1);
}
#tgec .tgec-select__icon { color: var(--p2); flex-shrink: 0; }
#tgec .tgec-select__val { flex: 1; font-weight: 500; }
#tgec .tgec-select__ph { color: var(--muted2); font-weight: 400; }
#tgec .tgec-select__pills { display: flex; gap: 4px; flex-wrap: wrap; }
#tgec .tgec-select__chevron {
  color: var(--muted); flex-shrink: 0;
  transition: transform .2s;
}
#tgec .tgec-select[aria-expanded="true"] .tgec-select__chevron {
  transform: rotate(180deg);
}

/* Dropdown panel */
#tgec .tgec-select__panel {
  position: absolute; top: calc(100% + 6px);
  left: 0; right: 0; z-index: 1200;
  background: var(--surf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r-md);
  box-shadow: var(--sh-lg);
  overflow: hidden;
  animation: tgecPanelIn .15s ease;
}
@keyframes tgecPanelIn {
  from { opacity: 0; transform: translateY(-4px) scale(.99); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

#tgec .tgec-select__search {
  display: flex; align-items: center; gap: .5rem;
  padding: .6rem 1rem;
  border-bottom: 1px solid var(--bdr);
  position: sticky; top: 0; background: var(--surf); z-index: 1;
}
#tgec .tgec-select__search svg { color: var(--muted); flex-shrink: 0; }
#tgec #tgecSearch {
  border: none; outline: none; width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: .85rem; color: var(--ink); background: transparent;
}
#tgec #tgecSearch::placeholder { color: var(--muted2); }
#tgec .tgec-search-clear {
  background: none; border: none; padding: 2px;
  cursor: pointer; color: var(--muted2);
  display: flex; align-items: center;
  transition: color .15s;
}
#tgec .tgec-search-clear:hover { color: var(--ink); }

#tgec .tgec-select__meta {
  padding: .25rem 1rem;
  font-size: .7rem; font-weight: 600;
  color: var(--muted2); letter-spacing: .04em; text-transform: uppercase;
  background: var(--bg2); border-bottom: 1px solid var(--bdr);
}

#tgec .tgec-select__list {
  list-style: none; margin: 0; padding: .25rem 0;
  max-height: 280px; overflow-y: auto;
  scroll-behavior: smooth;
}
#tgec .tgec-select__list::-webkit-scrollbar { width: 5px; }
#tgec .tgec-select__list::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

#tgec .tgec-select__opt {
  display: flex; align-items: center; gap: .75rem;
  padding: .5rem 1rem; cursor: pointer;
  transition: background .1s; outline: none;
}
#tgec .tgec-select__opt:hover,
#tgec .tgec-select__opt.is-focused { background: var(--p5); }
#tgec .tgec-select__opt.is-selected { background: rgba(0,103,93,.07); }
#tgec .tgec-select__opt.is-selected .tgec-opt-label { color: var(--p2); }

#tgec .tgec-opt-main { flex: 1; display: flex; flex-direction: column; gap: 2px; }
#tgec .tgec-opt-label { font-size: .85rem; font-weight: 500; color: var(--ink); }
#tgec .tgec-opt-codes { display: flex; gap: 3px; flex-wrap: wrap; }
#tgec .tgec-opt-check { color: var(--p2); flex-shrink: 0; margin-left: auto; }

#tgec .tgec-select__empty {
  display: flex; align-items: center; gap: .5rem; justify-content: center;
  padding: 1.5rem 1rem;
  font-size: .8rem; color: var(--muted2);
}

/* Code pills */
#tgec .tgec-code-pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 9999px;
  font-size: .7rem; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  background: var(--p5); color: var(--p1);
  border: 1px solid var(--p4);
}
#tgec .tgec-code-pill--sm { padding: 1px 6px; font-size: .65rem; }

/* ---- BRANCH STRIP --------------------------------------------------- */
#tgec .tgec-strip {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: .5rem 1rem;
  background: linear-gradient(135deg, var(--p5), #eefffd);
  border: 1px solid var(--p4);
  border-radius: var(--r-md);
  padding: .75rem 1rem;
  margin-bottom: 1.25rem;
}
#tgec .tgec-strip__label {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--p1);
}
#tgec .tgec-strip__codes { display: flex; flex-wrap: wrap; gap: .4rem; }
#tgec .tgec-strip__item {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surf); border: 1px solid var(--p4);
  border-radius: 9999px; padding: 2px 8px 2px 3px;
}
#tgec .tgec-strip__code {
  background: var(--p2); color: #fff;
  border-radius: 9999px; padding: 1px 7px;
  font-size: .65rem; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
}
#tgec .tgec-strip__name { font-size: .7rem; color: var(--muted); }
#tgec .tgec-strip__desc {
  width: 100%; color: var(--muted); font-size: .75rem;
  padding-top: .25rem; margin-top: .15rem;
  border-top: 1px solid rgba(0,103,93,.1);
}

/* ---- INFO CARDS ----------------------------------------------------- */
#tgec .tgec-infocard {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 1rem;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--sh-sm);
}
#tgec .tgec-infocard--teal { border-left: 3px solid var(--p2); }
#tgec .tgec-infocard--amber { border-left: 3px solid var(--amber); }

#tgec .tgec-infocard__icon {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  background: var(--p5); color: var(--p2);
  border-radius: var(--r-md); flex-shrink: 0;
}
#tgec .tgec-infocard__icon--amber { background: var(--amberb); color: var(--amber); }

#tgec .tgec-infocard__body h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink);
  margin: 0 0 .5rem; line-height: 1.2;
}
#tgec .tgec-infocard__text p {
  font-size: .85rem; line-height: 1.6;
  color: var(--muted); margin: 0 0 .5rem;
}
#tgec .tgec-infocard__text ul {
  margin: .3rem 0 .5rem 1.25rem; padding: 0;
}
#tgec .tgec-infocard__text li {
  font-size: .83rem; line-height: 1.6;
  color: var(--muted); margin-bottom: .25rem;
}
#tgec .tgec-infocard__note {
  background: rgba(0,103,93,.05);
  border-left: 3px solid var(--p2);
  padding: .5rem .75rem;
  border-radius: 0 6px 6px 0;
  font-size: .83rem; color: var(--ink2);
  margin-top: .5rem;
}
#tgec .tgec-infocard--amber .tgec-infocard__note {
  background: rgba(201,122,0,.05);
  border-left-color: var(--amber);
  color: var(--amberd);
}

/* Expandable Info Card */
#tgec .tgec-infocard-details {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  margin-bottom: 1.25rem;
  box-shadow: var(--sh-sm);
}
#tgec .tgec-infocard-details.tgec-infocard--teal { border-left: 3px solid var(--p2); }
#tgec .tgec-infocard-details__summary {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem; cursor: pointer; list-style: none;
}
#tgec .tgec-infocard-details__summary::-webkit-details-marker { display: none; }
#tgec .tgec-infocard-details__left {
  display: flex; align-items: center; gap: 1rem;
}
#tgec .tgec-infocard-details__left h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink); margin: 0; line-height: 1.2;
}
#tgec .tgec-details-chevron {
  color: var(--muted); transition: transform 0.2s; flex-shrink: 0; margin-left: 1rem;
}
#tgec .tgec-infocard-details[open] .tgec-details-chevron { transform: rotate(180deg); }
#tgec .tgec-infocard-details__body {
  padding: 0 1.25rem 1.25rem calc(1.25rem + 44px + 1rem);
}

/* ---- TABLE TOOLBAR -------------------------------------------------- */
#tgec .tgec-toolbar {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: .75rem;
  margin-bottom: .85rem;
}
#tgec .tgec-toolbar__left {
  display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
}
#tgec .tgec-result-badge {
  background: var(--p5); color: var(--p1);
  border: 1px solid var(--p4);
  padding: 3px 12px; border-radius: 9999px;
  font-size: .8rem; font-weight: 500;
}
#tgec .tgec-cache-tag {
  background: var(--bg2); color: var(--muted2);
  border: 1px solid var(--bdr);
  padding: 2px 8px; border-radius: 9999px;
  font-size: .68rem;
}
#tgec .tgec-toolbar__right {
  display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
}
#tgec .tgec-search-box {
  display: flex; align-items: center; gap: .5rem;
  padding: 6px 12px;
  background: var(--surf);
  border: 1.5px solid var(--bdr2);
  border-radius: var(--r-md);
  min-width: 220px;
  transition: border-color .2s;
}
#tgec .tgec-search-box:focus-within { border-color: var(--p2); }
#tgec .tgec-search-box svg { color: var(--muted); flex-shrink: 0; }
#tgec #tableSearch {
  border: none; outline: none; width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: .85rem; color: var(--ink); background: transparent;
}
#tgec #tableSearch::placeholder { color: var(--muted2); }

/* ---- TABLE WRAPPER + STICKY HEADER (DESKTOP) ----------------------- */
#tgec .tgec-table-wrap {
  overflow: visible; /* CRITICAL: Enables window-level sticky header */
  border-radius: var(--r-md);
  border: 1px solid var(--bdr);
  box-shadow: var(--sh-md);
  background: var(--surf);
  margin-bottom: 1.5rem;
  position: relative;
}

/* Desktop sticky header */
@media (min-width: 641px) {
  #tgec .tgec-table thead th {
    position: sticky;
    top: 0; /* Change this if you have a fixed top navigation bar (e.g. top: 60px;) */
    z-index: 10;
    background: linear-gradient(135deg, var(--p0) 0%, var(--p1) 45%, var(--p2) 100%);
  }
  #tgec .tgec-table thead th:first-child { border-top-left-radius: var(--r-md); }
  #tgec .tgec-table thead th:last-child { border-top-right-radius: var(--r-md); }
}

/* ---- TABLE ---------------------------------------------------------- */
#tgec .tgec-table {
  width: 100%; border-collapse: collapse;
  font-size: .83rem;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
#tgec .tgec-table *::selection     { background: transparent; }
#tgec .tgec-table *::-moz-selection { background: transparent; }

/* Table head */
#tgec .tgec-table thead {
  background: linear-gradient(135deg, var(--p0) 0%, var(--p1) 45%, var(--p2) 100%);
}
#tgec .tgec-table th {
  padding: 10px 12px; text-align: left;
  color: rgba(255,255,255,.9);
  font-size: .7rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  white-space: nowrap;
}
#tgec .tgec-table th.sortable { cursor: pointer; }
#tgec .tgec-table th.sortable:hover { background: rgba(255,255,255,.08); }
#tgec .tgec-table th.th-active-sort { color: #5eead4; }

/* Sort Icons */
#tgec .sort-ico {
  width: 10px; height: 14px;
  display: inline-block; vertical-align: middle; margin-left: 3px;
  position: relative; top: -1px;
}
#tgec .sort-up, #tgec .sort-down {
  opacity: 0.35;
  fill: rgba(255,255,255,.8);
  transition: opacity 0.2s, fill 0.2s;
}
#tgec .th-active-sort.sort-asc .sort-up {
  opacity: 1;
  fill: #5eead4;
}
#tgec .th-active-sort.sort-desc .sort-down {
  opacity: 1;
  fill: #5eead4;
}

/* Table body */
#tgec .tgec-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--bdr);
  vertical-align: middle;
}
#tgec .tgec-table tbody tr:last-child td { border-bottom: none; }
#tgec .tgec-table tbody tr:hover td { background: var(--p5); }

/* Tier highlights */
#tgec .tgec-table tbody tr.tr-gold td { background: linear-gradient(90deg, #fffbeb 0%, #fffff8 80%, transparent 100%); }
#tgec .tgec-table tbody tr.tr-gold td:first-child { border-left: 3px solid var(--gold); }
#tgec .tgec-table tbody tr.tr-gold:hover td { background: #fef9e0; }
#tgec .tgec-table tbody tr.tr-teal td:first-child { border-left: 3px solid rgba(0,103,93,.25); }

/* Rank indicators */
#tgec .tgec-rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem; font-weight: 600;
}
#tgec .tgec-rank--gold {
  background: linear-gradient(135deg, #c89400, var(--gold));
  color: #fff;
  box-shadow: 0 2px 7px rgba(184,134,11,.4);
}
#tgec .tgec-rank--teal {
  background: linear-gradient(135deg, var(--p2), var(--p3));
  color: #fff;
}
#tgec .tgec-rank-plain {
  font-size: .75rem; color: var(--muted2);
  font-variant-numeric: tabular-nums;
}

/* College name cell */
#tgec .tgec-cname {
  display: block; font-weight: 600; color: var(--ink2);
  line-height: 1.3; max-width: 300px;
}

/* Desktop: hide all mobile-only elements */
#tgec .tgec-mob-stats    { display: none; }
#tgec .tgec-mob-expander { display: none; }
#tgec .tgec-mob-details  { display: none; }

/* Code cell */
#tgec .tgec-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  background: var(--bg2); color: var(--p1);
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--bdr);
}

/* Status badges */
#tgec .tgec-status-stack { display: flex; flex-direction: column; gap: 3px; }
#tgec .tgec-sb {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 9999px;
  font-size: .65rem; font-weight: 700;
  white-space: nowrap; width: fit-content;
}
#tgec .sb-purple { background: var(--purpb); color: var(--purp); }
#tgec .sb-green  { background: var(--greenb); color: var(--green); }
#tgec .sb-blue   { background: var(--blueb); color: var(--blue); }
#tgec .sb-gold   { background: var(--goldb); color: var(--goldd); }
#tgec .sb-gray   { background: var(--bg2); color: var(--muted); border: 1px solid var(--bdr); }
#tgec .tgec-muted { color: var(--muted2); font-size: .75rem; }

/* NAAC badges */
#tgec .tgec-naac {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; padding: 2px 6px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem; font-weight: 700;
}
#tgec .naac-app  { background: #022c22; color: #34d399; }
#tgec .naac-ap   { background: #14532d; color: #86efac; }
#tgec .naac-a    { background: var(--greenb); color: var(--green); }
#tgec .naac-bpp  { background: #1e5f59; color: #93fdf2; }
#tgec .naac-bp   { background: var(--blueb); color: var(--blue); }
#tgec .naac-b    { background: #effffd; color: #3bf6e3; }
#tgec .naac-c    { background: #fef3c7; color: #92400e; }
#tgec .naac-na   { background: var(--bg2); color: var(--muted2); }

/* Rank cells */
#tgec .tgec-rank-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: .8rem; font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
#tgec .rank-median { color: var(--p2); }
#tgec .rank-close  { color: var(--red); }

/* Branch codes cell */
#tgec .tgec-bcodes { display: flex; flex-wrap: wrap; gap: 3px; }
#tgec .tgec-bcode {
  padding: 2px 5px;
  background: var(--p5); color: var(--p1);
  border-radius: 4px; cursor: help;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem; font-weight: 600;
}

/* ---- EMPTY STATES --------------------------------------------------- */
#tgec .tgec-empty {
  text-align: center; padding: 2.5rem 1.5rem;
  border: 2px dashed var(--bdr2);
  border-radius: var(--r-xl);
  background: var(--bg); margin: 1.25rem 0;
}
#tgec .tgec-empty--warn { border-color: #fcd34d; background: #fffde7; }
#tgec .tgec-empty__icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 60px; height: 60px;
  background: var(--p5); color: var(--p2);
  border-radius: 50%; margin-bottom: 1rem;
}
#tgec .tgec-empty__icon--warn { background: #fef3c7; color: #b45309; }
#tgec .tgec-empty h3 {
  font-size: 1.1rem; font-weight: 700; color: var(--ink); margin: 0 0 .5rem;
}
#tgec .tgec-empty p {
  font-size: .85rem; color: var(--muted);
  max-width: 500px; margin: 0 auto 1rem; line-height: 1.5;
}
#tgec .tgec-empty__hints {
  list-style: none; margin: 0 auto; padding: 0;
  max-width: 420px; text-align: left;
}
#tgec .tgec-empty__hints li {
  font-size: .8rem; color: var(--muted);
  padding: .3rem 0 .3rem 1.25rem; position: relative;
}
#tgec .tgec-empty__hints li::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 5px; height: 5px;
  background: var(--p2); border-radius: 50%;
}
#tgec .tgec-filter-empty {
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  padding: 1.25rem; font-size: .85rem; color: var(--muted);
  background: var(--bg); border-radius: var(--r-md); margin-bottom: 1rem;
}

/* ---- SEO SECTION ---------------------------------------------------- */
#tgec .tgec-seo {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  margin: 1.5rem 0;
}
#tgec .tgec-seo h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink);
  margin: 0 0 .75rem; padding-bottom: .6rem;
  border-bottom: 2px solid var(--p5);
}
#tgec .tgec-seo-body p {
  font-size: .83rem; line-height: 1.7;
  color: var(--muted); margin: 0 0 .6rem;
}
#tgec .tgec-seo-body a { color: var(--p2); }
#tgec .tgec-seo-body em { font-size: .75rem; opacity: .8; }

/* ---- INSIGHTS GRID -------------------------------------------------- */
#tgec .tgec-insights {
  margin: 2rem 0 1.5rem;
}
#tgec .tgec-insights-header {
  display: flex; align-items: center; gap: .5rem;
  margin-bottom: .85rem;
}
#tgec .tgec-insights-header svg { color: var(--p2); }
#tgec .tgec-insights-header h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink); margin: 0;
}
#tgec .tgec-ins-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
}
#tgec .tgec-ins-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-md);
  padding: 1rem 1.1rem;
  box-shadow: var(--sh-xs);
  display: flex; flex-direction: column; gap: .25rem;
  position: relative; overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
#tgec .tgec-ins-card:hover {
  box-shadow: var(--sh-sm); transform: translateY(-2px);
}
#tgec .tgec-ins-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
#tgec .tgec-ins-card--teal::before { background: linear-gradient(90deg, var(--p2), var(--p3)); }
#tgec .tgec-ins-card--gold::before { background: linear-gradient(90deg, var(--gold), #e0a800); }
#tgec .tgec-ins-card--blue::before { background: linear-gradient(90deg, var(--blue), #6efef0); }
#tgec .tgec-ins-card--green::before { background: linear-gradient(90deg, var(--green), #34c77b); }

#tgec .tgec-ins-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem; font-weight: 700;
  color: var(--ink); line-height: 1;
  font-variant-numeric: tabular-nums;
}
#tgec .tgec-ins-val--teal { color: var(--p2); }
#tgec .tgec-ins-val--gold { color: var(--gold); }
#tgec .tgec-ins-val--blue { color: var(--blue); }
#tgec .tgec-ins-val--green { color: var(--green); }
#tgec .tgec-ins-lbl {
  font-size: .7rem; color: var(--muted); font-weight: 500;
}
#tgec .tgec-ins-sub {
  font-size: .65rem; color: var(--muted2);
}

/* ---- FAQ SECTION ---------------------------------------------------- */
#tgec .tgec-faq {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  margin: 1.5rem 0;
  box-shadow: var(--sh-sm);
}
#tgec .tgec-faq-header {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: 1rem;
  padding-bottom: .85rem;
  border-bottom: 2px solid var(--p5);
}
#tgec .tgec-faq-header svg { color: var(--p2); flex-shrink: 0; }
#tgec .tgec-faq-header h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink); margin: 0;
}
#tgec .tgec-faq-item {
  border-bottom: 1px solid var(--bg2);
}
#tgec .tgec-faq-item:last-child { border-bottom: none; }
#tgec .tgec-faq-item summary {
  padding: .85rem 0;
  cursor: pointer;
  font-weight: 600; font-size: .85rem;
  color: var(--ink);
  display: flex; align-items: center; justify-content: space-between; gap: .75rem;
  list-style: none;
  transition: color .15s;
}
#tgec .tgec-faq-item summary::-webkit-details-marker { display: none; }
#tgec .tgec-faq-item[open] summary { color: var(--p2); }
#tgec .tgec-faq-q-text { flex: 1; }
#tgec .tgec-faq-icon {
  width: 20px; height: 20px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--bg2); color: var(--muted);
  flex-shrink: 0;
  transition: background .15s, color .15s, transform .25s cubic-bezier(.4,0,.2,1);
}
#tgec .tgec-faq-item[open] .tgec-faq-icon {
  background: var(--p5); color: var(--p2);
  transform: rotate(45deg);
}
#tgec .tgec-faq-body {
  padding: 0 0 .85rem;
  font-size: .83rem; line-height: 1.7;
  color: var(--muted);
  animation: tgecFaqIn .2s ease;
}
@keyframes tgecFaqIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
#tgec .tgec-faq-body p { margin: 0 0 .5rem; }
#tgec .tgec-faq-body p:last-child { margin-bottom: 0; }
#tgec .tgec-faq-body ul {
  margin: .3rem 0 .5rem 1.25rem; padding: 0;
}
#tgec .tgec-faq-body li { margin-bottom: .25rem; }
#tgec .tgec-faq-body strong { color: var(--ink2); }

/* ---- BRANCH NAV ----------------------------------------------------- */
#tgec .tgec-branch-nav {
  background: linear-gradient(135deg, var(--p5) 0%, #eefffd 100%);
  border: 1px solid var(--p4);
  border-radius: var(--r-lg);
  padding: 1.25rem 1.5rem;
  margin: 1.5rem 0;
}
#tgec .tgec-branch-nav h2 {
  font-size: .8rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--p1);
  margin: 0 0 .85rem;
}
#tgec .tgec-bnav-grid {
  display: flex; flex-wrap: wrap; gap: .5rem;
}
#tgec .tgec-bnav-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 5px;
  background: var(--surf);
  border: 1px solid var(--bdr2);
  border-radius: 9999px;
  text-decoration: none;
  font-size: .75rem; font-weight: 500;
  color: var(--ink2);
  transition: all .15s;
}
#tgec .tgec-bnav-link:hover {
  background: var(--p5); border-color: var(--p2);
  color: var(--p2); transform: translateY(-1px);
  box-shadow: var(--sh-xs);
}
#tgec .tgec-bnav-link.is-active {
  background: var(--p2); border-color: var(--p1);
  color: #fff; cursor: default; transform: none;
}
#tgec .tgec-bnav-link.is-active:hover { background: var(--p2); box-shadow: none; }
#tgec .tgec-bnav-code {
  background: rgba(0,0,0,.08);
  border-radius: 9999px; padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .63rem; font-weight: 700;
}
#tgec .tgec-bnav-link.is-active .tgec-bnav-code { background: rgba(255,255,255,.2); }

/* ---- RESPONSIVE ----------------------------------------------------- */
@media (max-width: 1024px) {
  #tgec .tgec-ins-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 900px) {
  #tgec .tgec-hero-body { grid-template-columns: 1fr; }
  #tgec .tgec-stat-card { display: none; }
  #tgec .tgec-hero-text h1 { font-size: 1.8rem; }
}

/* ============================================================
   MOBILE CARD LAYOUT (≤ 640px)
   ============================================================ */
@media (max-width: 640px) {

  /* ---- Hero ---- */
  #tgec .tgec-hero { padding: 1.75rem 0 2.5rem; }
  #tgec .tgec-hero-text h1 { font-size: 1.5rem; }
  #tgec .tgec-hero-branch { font-size: 1.35rem; }

  /* ---- Selector card ---- */
  #tgec .tgec-selector-card { padding: 1.15rem; border-radius: var(--r-lg); }
  #tgec .tgec-select__list { max-height: 240px; }

  /* ---- Toolbar ---- */
  #tgec .tgec-toolbar { flex-direction: column; align-items: flex-start; }
  #tgec .tgec-toolbar__right { width: 100%; flex-direction: column; align-items: flex-start; }
  #tgec .tgec-search-box { min-width: unset; width: 100%; }

  /* ---- Info cards ---- */
  #tgec .tgec-infocard { grid-template-columns: 1fr; gap: .75rem; }
  #tgec .tgec-infocard__icon { width: 38px; height: 38px; }
  #tgec .tgec-infocard-details__summary { padding: 1.15rem; }
  #tgec .tgec-infocard-details__left { gap: .75rem; }
  #tgec .tgec-infocard-details__body { padding: 0 1.15rem 1.15rem; }

  /* ---- Strip ---- */
  #tgec .tgec-strip { flex-direction: column; align-items: flex-start; }

  /* ---- Insights ---- */
  #tgec .tgec-ins-grid { grid-template-columns: repeat(2, 1fr); gap: .6rem; }
  #tgec .tgec-ins-val { font-size: 1.2rem; }

  /* ---- FAQ ---- */
  #tgec .tgec-faq { padding: 1.15rem; }

  /* ---- Branch nav ---- */
  #tgec .tgec-branch-nav { padding: 1.15rem; }

  /* ---- SEO ---- */
  #tgec .tgec-seo { padding: 1.15rem; }

  /* ============================================================
     TABLE → CARD TRANSFORMATION
     ============================================================ */

  /* 1. Reset the wrapper to transparent / no border */
  #tgec .tgec-table-wrap {
    overflow:      visible !important;
    background:    transparent;
    border:        none;
    box-shadow:    none;
    border-radius: 0;
  }

  /* 2. Make table a block, hide thead */
  #tgec .tgec-table          { display: block; width: 100%; }
  #tgec .tgec-table thead    { display: none; }
  #tgec .tgec-table tbody    { display: flex; flex-direction: column; gap: 8px; }

  /* 3. Each tr = a card */
  #tgec .tgec-table tbody tr {
    display:        flex !important;
    align-items:    flex-start;
    background:     var(--surf);
    border:         1.5px solid var(--bdr);
    border-radius:  var(--r-md);
    overflow:       hidden;
    box-shadow:     var(--sh-xs);
    transition:     box-shadow .2s ease, border-color .2s ease;
  }
  #tgec .tgec-table tbody tr.tr-gold {
    border-color: rgba(184,134,11,.45);
    border-left:  3px solid var(--gold) !important;
    background:   linear-gradient(120deg, #fffdf5 0%, var(--surf) 60%);
  }
  #tgec .tgec-table tbody tr.tr-teal {
    border-left: 3px solid rgba(0,103,93,.35) !important;
  }
  #tgec .tgec-table tbody tr.is-expanded {
    border-color: var(--p3);
    box-shadow:   var(--sh-sm);
  }
  /* Reset hover on cards */
  #tgec .tgec-table tbody tr:hover td { background: transparent !important; }

  /* 4. ALL tds hidden by default */
  #tgec .tgec-table tbody td {
    display:  none !important;
    border:   none !important;
    padding:  0 !important;
  }

  /* 5. Show RANK cell — left pillar */
  #tgec .tgec-table tbody td.col-rank {
    display:      flex !important;
    align-items:  flex-start;
    padding:      11px 0 11px 11px !important;
    flex-shrink:  0;
    width:        40px;
  }

  /* 6. Show NAME cell — main content */
  #tgec .tgec-table tbody td.col-name {
    display:   block !important;
    flex:      1;
    min-width: 0;
    padding:   11px 11px 11px 6px !important;
  }

  /* ---- College name ---- */
  #tgec .tgec-cname {
    max-width:   100%;
    font-size:   .85rem;
    line-height: 1.3;
    display:     block;
  }

  /* ---- .tgec-cname-wrap (header row inside the cell) ---- */
  #tgec .tgec-cname-wrap {
    display:         flex;
    align-items:     flex-start;
    justify-content: space-between;
    gap:             8px;
  }

  /* ---- Mobile expander button ---- */
  #tgec .tgec-mob-expander {
    display:         flex !important;
    align-items:     center;
    justify-content: center;
    flex-shrink:     0;
    width:           28px;
    height:          28px;
    background:      var(--bg2);
    border:          1px solid var(--bdr);
    border-radius:   6px;
    cursor:          pointer;
    color:           var(--muted);
    transition:      background .15s, border-color .15s, color .15s;
    margin-top:      1px;
  }
  #tgec .tgec-mob-expander svg {
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  #tgec .tgec-table tr.is-expanded .tgec-mob-expander {
    background:   var(--p5);
    border-color: var(--p2);
    color:        var(--p2);
  }
  #tgec .tgec-table tr.is-expanded .tgec-mob-expander svg {
    transform: rotate(180deg);
  }

  /* ---- Mobile stats bar (code + median ALWAYS VISIBLE BEFORE EXPAND) ---- */
  #tgec .tgec-mob-stats {
    display:     flex !important;
    align-items: center;
    gap:         6px;
    margin-top:  6px;
    flex-wrap:   wrap;
  }
  #tgec .tgec-code-mob {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem; font-weight: 700;
    background: var(--bg2); color: var(--p1);
    padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--bdr);
  }
  #tgec .tgec-ms-ranks {
    display:     flex;
    align-items: center;
    gap:         5px;
    flex-wrap:   wrap;
  }
  #tgec .tgec-ms-item {
    display:        flex;
    align-items:    baseline;
    gap:            4px;
  }
  #tgec .tgec-ms-lbl {
    font-size:      .65rem;
    color:          var(--muted);
    font-weight:    500;
  }
  #tgec .tgec-ms-v {
    font-family:          'JetBrains Mono', monospace;
    font-size:            .78rem;
    font-weight:          700;
    font-variant-numeric: tabular-nums;
  }
  #tgec .tgec-ms-median .tgec-ms-v { color: var(--p2); }

  /* ---- Mobile details panel — animated accordion ---- */
  #tgec .tgec-mob-details {
    display:    block !important;
    overflow:   hidden;
    max-height: 0;
    opacity:    0;
    transition: max-height .32s cubic-bezier(.4,0,.2,1),
                opacity .22s ease,
                margin-top .22s ease;
    margin-top: 0;
  }
  #tgec .tgec-table tr.is-expanded .tgec-mob-details {
    max-height: 520px;
    opacity:    1;
    margin-top: 8px;
  }

  /* ---- Mobile detail items ---- */
  #tgec .tgec-mob-details-inner {
    background:    var(--bg2);
    border-radius: var(--r-sm);
    padding:       8px 10px;
  }
  #tgec .tgec-md-item {
    display:       flex;
    align-items:   flex-start;
    gap:           8px;
    font-size:     .8rem;
    padding:       6px 0;
    border-bottom: 1px solid rgba(212,230,228,.6);
  }
  #tgec .tgec-md-item:last-child { border-bottom: none; padding-bottom: 2px; }
  #tgec .tgec-md-lbl {
    color:      var(--muted);
    font-weight: 600;
    min-width:  85px;
    font-size:  .74rem;
    padding-top: 1px;
  }
  #tgec .tgec-md-val { flex: 1; min-width: 0; }

  /* ---- Rank indicators on mobile ---- */
  #tgec .tgec-rank { width: 22px; height: 22px; font-size: .65rem; }
  #tgec .tgec-rank-plain { font-size: .72rem; }

}

@media (max-width: 400px) {
  #tgec .tgec-hero-text h1 { font-size: 1.3rem; }
  #tgec .tgec-hero-branch { font-size: 1.2rem; }
  #tgec .tgec-wrap { padding: 0 .85rem; }
  #tgec .tgec-ins-grid { grid-template-columns: 1fr 1fr; }
}

/* ---- PRINT ---------------------------------------------------------- */
@media print {
  .tgec-table-wrap, .tgec-toolbar, .tgec-skip,
  .tgec-empty, .tgec-filter-empty, .tgec-insights,
  .tgec-faq, .tgec-branch-nav { display: none !important; }
}


#ev-footer {
  --evf-bg:      #072b27;
  --evf-bg2:     #0d4b45;
  --evf-text:    rgba(255,255,255,.5);
  --evf-head:    #ffffff;
  --evf-link:    rgba(255,255,255,.55);
  --evf-accent:  #00c6b8;
  --evf-gold:    #f59e0b;
  --evf-border:  rgba(255,255,255,.07);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
 
#ev-footer .evf-wrap {
  background: var(--evf-bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% 0%, rgba(0,198,184,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5% 100%, rgba(14,138,126,.25) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
  padding: 5rem 0 0;
}
 
/* Decorative line at top */
#ev-footer .evf-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,198,184,.4), rgba(14,138,126,.4), transparent);
}
 
/* Top grid */
#ev-footer .evf-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  position: relative;
  z-index: 1;
}
@media (max-width: 991px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
}
@media (max-width: 575px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr; gap: 1.75rem; }
}
 
/* Brand */
#ev-footer .evf-brand {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Sora', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--evf-head);
  text-decoration: none;
  margin-bottom: .75rem;
  transition: opacity .2s;
}
#ev-footer .evf-brand:hover { opacity: .85; }
#ev-footer .evf-brand-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--evf-accent), #08b2a1);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
 
#ev-footer .evf-tagline {
  font-size: .9rem; line-height: 1.7;
  color: var(--evf-text);
  margin-bottom: 1.5rem;
  max-width: 280px;
}
 
/* Trust badge */
#ev-footer .evf-trust {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--evf-border);
  border-radius: 100px;
  padding: .5rem 1.1rem;
  text-decoration: none;
  font-size: .8rem; font-weight: 600;
  color: var(--evf-text);
  transition: border-color .2s, color .2s, background .2s;
  margin-bottom: .75rem;
}
#ev-footer .evf-trust:hover {
  border-color: var(--evf-accent);
  color: var(--evf-accent);
  background: rgba(0,198,184,.05);
}
#ev-footer .evf-trust-dot {
  width: 8px; height: 8px;
  background: #10b981;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.2);
  animation: evfPulse 2.5s infinite;
}
@keyframes evfPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.2); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,.08); }
}
 
/* Column heading */
#ev-footer .evf-col-head {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;

    function init() {

        var ticking   = false;

        // ── Show / hide — rAF-throttled for smooth 60 fps handling ────────────
        function updateVisibility() {
            btn.classList.toggle('visible', window.scrollY > THRESHOLD);
            ticking = false;
        }

        window.addEventListener('scroll', function () {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(updateVisibility);
        }, { passive: true });

        // ── Smooth scroll to top ──────────────────────────────────────────────
        btn.addEventListener('click', function (e) {
            spawnRipple(e);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── Ripple helper ─────────────────────────────────────────────────────
        function spawnRipple(e) {
            var el     = btn;
            var d      = Math.max(el.offsetWidth, el.offsetHeight);

            var ripple = document.createElement('span');

                'width:'  + d + 'px',
                'height:' + d + 'px',
                'left:'   + (e.clientX - rect.left  - d / 2) + 'px',
                'top:'    + (e.clientY - rect.top   - d / 2) + 'px'
            ].join(';');

            text:  btn.dataset.shareText  || legacy.text  || (meta ? meta.content : '') || '',

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(cfg.url)
                    .then(function ()  { feedback(true,  true); })
                    .catch(function () { legacyFallback(); });

            ta.value = cfg.url;
            ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0;';
            ta.setAttribute('readonly', '');
            document.body.appendChild(ta);
            ta.focus();
            ta.select();

            try { ok = document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);
