/* ---- Root tokens ---------------------------------------------------- */
#apec {
  /* Deep indigo primary palette */
  --p0: #0d1433;
  --p1: #1a2563;
  --p2: #2d3eaa;
  --p3: #4f63d2;
  --p4: #c7d0f8;
  --p5: #eef0fd;

  /* Saffron accent (replaces teal secondary) */
  --saffron:  #d97706;
  --saffronb: #fffbeb;
  --saffrond: #92400e;
  --saffron-bright: #f59e0b;

  --gold:  #b8860b;
  --goldb: #fdf3d0;
  --goldd: #7a5800;

  --amber:  #d97706;
  --amberb: #fffbeb;
  --amberd: #92400e;

  --red:   #c0392b;
  --redb:  #fdecea;

  --blue:  #1a56db;
  --blueb: #ebf5ff;

  --green: #0b6e4f;
  --greenb:#d1fae5;

  --purp:  #6d28d9;
  --purpb: #ede9fe;

  --ink:   #0f1530;
  --ink2:  #1a2563;
  --muted: #4a5080;
  --muted2:#7880a8;

  --bdr:   #d0d5f0;
  --bdr2:  #b3bde8;
  --bg:    #f6f7fd;
  --bg2:   #eceef9;
  --surf:  #ffffff;

  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 26px;

  --sh-xs: 0 1px 3px rgba(13,20,51,.07), 0 1px 2px rgba(13,20,51,.04);
  --sh-sm: 0 2px 8px rgba(13,20,51,.09), 0 1px 3px rgba(13,20,51,.05);
  --sh-md: 0 6px 20px rgba(13,20,51,.11), 0 2px 6px rgba(13,20,51,.06);
  --sh-lg: 0 20px 50px rgba(0,0,0,.15), 0 6px 18px rgba(0,0,0,.08);

  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  background: var(--bg);
}

/* ---- Util ----------------------------------------------------------- */
#apec .apec-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
#apec .apec-skip {
  position: absolute;
  left: -9999px;
}
#apec .apec-skip:focus {
  left: 0; top: 0; z-index: 9999;
  padding: 8px 18px;
  background: var(--p2);
  color: #fff;
  font-size: 0.875rem;
  font-family: 'Outfit', sans-serif;
}

/* ---- HERO ----------------------------------------------------------- */
#apec .apec-hero {
  background:
    radial-gradient(ellipse 65% 80% at 100% 0%,   rgba(79,99,210,.40) 0%, transparent 60%),
    radial-gradient(ellipse 45% 55% at 0%  100%,  rgba(217,119,6,.18) 0%, transparent 55%),
    linear-gradient(145deg, #060c24 0%, #0d1a4a 42%, #1a2d7a 100%);
  padding: 3rem 0 4.5rem;
  position: relative;
  overflow: hidden;
}
#apec .apec-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,.022) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}
#apec .apec-hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--saffron-bright) 25%, #fcd34d 50%, var(--saffron-bright) 75%, transparent 100%);
}

/* Breadcrumb */
#apec .apec-breadcrumb {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap; margin-bottom: 2rem;
}
#apec .apec-breadcrumb a {
  color: rgba(255,255,255,.55); font-size: .8rem; text-decoration: none;
  transition: color .2s;
}
#apec .apec-breadcrumb a:hover { color: rgba(255,255,255,.9); }
#apec .apec-breadcrumb svg { color: rgba(255,255,255,.25); flex-shrink: 0; }
#apec .apec-breadcrumb span { color: rgba(255,255,255,.85); font-size: .8rem; }

/* Hero body */
#apec .apec-hero-body {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 3rem;
  align-items: center;
}
#apec .apec-chips {
  display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.1rem;
}
#apec .apec-chip {
  display: inline-flex; align-items: center;
  padding: 4px 13px; border-radius: 9999px;
  font-size: .73rem; font-weight: 600; letter-spacing: .04em;
  background: rgba(255,255,255,.12); color: rgba(255,255,255,.9);
  border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(8px);
}
#apec .apec-chip--outline {
  background: transparent; border-style: dashed; color: rgba(255,255,255,.65);
}
#apec .apec-chip--cache {
  background: rgba(251,191,36,.15); color: #fbbf24;
  border-color: rgba(251,191,36,.3);
}

#apec .apec-hero-text h1 {
  font-size: 2.4rem; font-weight: 900; line-height: 1.15;
  letter-spacing: -.03em; color: #fff; margin: 0 0 1rem;
}
#apec .apec-hero-branch {
  color: #fcd34d; display: block;
}
#apec .apec-hero-sub {
  color: rgba(255,255,255,.65); font-size: .95rem;
  line-height: 1.65; margin: 0 0 1.75rem; max-width: 520px;
}
#apec .apec-hero-sub strong { color: rgba(255,255,255,.9); }

#apec .apec-hero-cta {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: 10px 22px;
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.22);
  border-radius: 9999px;
  color: #fff; font-size: .875rem; font-weight: 600;
  text-decoration: none; transition: all .2s;
  backdrop-filter: blur(12px);
}
#apec .apec-hero-cta:hover {
  background: rgba(255,255,255,.2); transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.2);
}

/* Stat card */
#apec .apec-stat-card {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-lg);
  padding: 1.25rem 1.5rem;
  backdrop-filter: blur(20px);
}
#apec .apec-stat-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: .55rem 0;
}
#apec .apec-stat-sep {
  height: 1px; background: rgba(255,255,255,.09);
}
#apec .apec-stat-label { color: rgba(255,255,255,.5); font-size: .78rem; }
#apec .apec-stat-val {
  color: rgba(255,255,255,.92); font-weight: 700;
  font-size: .88rem; font-variant-numeric: tabular-nums;
}

/* ---- PAGE BODY ------------------------------------------------------ */
#apec .apec-body { padding-bottom: 4rem; }

/* ---- SELECTOR CARD -------------------------------------------------- */
#apec .apec-selector-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-top: 3px solid var(--saffron-bright);
  border-radius: var(--r-xl);
  padding: 1.75rem 2rem;
  margin: 2rem 0 1.5rem;
  box-shadow: var(--sh-md);
}
#apec .apec-selector-head {
  display: flex; align-items: flex-start; gap: 1rem;
  margin-bottom: 1.5rem;
}
#apec .apec-selector-head svg {
  color: var(--p2); flex-shrink: 0; margin-top: 2px;
}
#apec .apec-selector-head h2 {
  font-size: 1.05rem; font-weight: 700; color: var(--ink); margin: 0 0 .2rem;
}
#apec .apec-selector-head p {
  font-size: .82rem; color: var(--muted); margin: 0;
}

/* ---- CUSTOM SELECT -------------------------------------------------- */
#apec .apec-select { position: relative; }

#apec .apec-select__btn {
  width: 100%;
  display: flex; align-items: center; gap: .75rem;
  padding: .9rem 1rem;
  background: var(--surf);
  border: 2px solid var(--bdr2);
  border-radius: var(--r-md);
  cursor: pointer; text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: .95rem; color: var(--ink);
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--sh-xs);
}
#apec .apec-select__btn:hover,
#apec .apec-select[aria-expanded="true"] .apec-select__btn {
  border-color: var(--p2);
  box-shadow: 0 0 0 3.5px rgba(45,62,170,.13);
}
#apec .apec-select__icon { color: var(--p2); flex-shrink: 0; }
#apec .apec-select__val { flex: 1; font-weight: 500; }
#apec .apec-select__ph { color: var(--muted2); font-weight: 400; }
#apec .apec-select__pills { display: flex; gap: 4px; flex-wrap: wrap; }
#apec .apec-select__chevron {
  color: var(--muted); flex-shrink: 0;
  transition: transform .2s;
}
#apec .apec-select[aria-expanded="true"] .apec-select__chevron {
  transform: rotate(180deg);
}

/* Dropdown panel */
#apec .apec-select__panel {
  position: absolute; top: calc(100% + 8px);
  left: 0; right: 0; z-index: 1200;
  background: var(--surf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r-md);
  box-shadow: var(--sh-lg);
  overflow: hidden;
  animation: apecPanelIn .15s ease;
}
@keyframes apecPanelIn {
  from { opacity: 0; transform: translateY(-6px) scale(.99); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

#apec .apec-select__search {
  display: flex; align-items: center; gap: .5rem;
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--bdr);
  position: sticky; top: 0; background: var(--surf); z-index: 1;
}
#apec .apec-select__search svg { color: var(--muted); flex-shrink: 0; }
#apec #apecSearch {
  border: none; outline: none; width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: .9rem; color: var(--ink); background: transparent;
}
#apec #apecSearch::placeholder { color: var(--muted2); }
#apec .apec-search-clear {
  background: none; border: none; padding: 2px;
  cursor: pointer; color: var(--muted2);
  display: flex; align-items: center;
  transition: color .15s;
}
#apec .apec-search-clear:hover { color: var(--ink); }

#apec .apec-select__meta {
  padding: .35rem 1rem;
  font-size: .72rem; font-weight: 600;
  color: var(--muted2); letter-spacing: .04em; text-transform: uppercase;
  background: var(--bg2); border-bottom: 1px solid var(--bdr);
}

#apec .apec-select__list {
  list-style: none; margin: 0; padding: .3rem 0;
  max-height: 320px; overflow-y: auto;
  scroll-behavior: smooth;
}
#apec .apec-select__list::-webkit-scrollbar { width: 5px; }
#apec .apec-select__list::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

#apec .apec-select__opt {
  display: flex; align-items: center; gap: .75rem;
  padding: .65rem 1rem; cursor: pointer;
  transition: background .1s; outline: none;
}
#apec .apec-select__opt:hover,
#apec .apec-select__opt.is-focused { background: var(--p5); }
#apec .apec-select__opt.is-selected { background: rgba(45,62,170,.07); }
#apec .apec-select__opt.is-selected .apec-opt-label { color: var(--p2); }

#apec .apec-opt-main { flex: 1; display: flex; flex-direction: column; gap: 3px; }
#apec .apec-opt-label { font-size: .88rem; font-weight: 500; color: var(--ink); }
#apec .apec-opt-codes { display: flex; gap: 3px; flex-wrap: wrap; }
#apec .apec-opt-check { color: var(--p2); flex-shrink: 0; margin-left: auto; }

#apec .apec-select__empty {
  display: flex; align-items: center; gap: .5rem; justify-content: center;
  padding: 1.75rem 1rem;
  font-size: .85rem; color: var(--muted2);
}

/* Code pills */
#apec .apec-code-pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 9999px;
  font-size: .72rem; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  background: var(--p5); color: var(--p1);
  border: 1px solid var(--p4);
}
#apec .apec-code-pill--sm { padding: 2px 7px; font-size: .67rem; }

/* ---- BRANCH STRIP --------------------------------------------------- */
#apec .apec-strip {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: .5rem 1rem;
  background: linear-gradient(135deg, var(--p5), #eef0fd);
  border: 1px solid var(--p4);
  border-radius: var(--r-md);
  padding: .85rem 1.2rem;
  margin-bottom: 1.5rem;
}
#apec .apec-strip__label {
  font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--p1);
}
#apec .apec-strip__codes { display: flex; flex-wrap: wrap; gap: .4rem; }
#apec .apec-strip__item {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surf); border: 1px solid var(--p4);
  border-radius: 9999px; padding: 3px 10px 3px 4px;
}
#apec .apec-strip__code {
  background: var(--p2); color: #fff;
  border-radius: 9999px; padding: 1px 8px;
  font-size: .68rem; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
}
#apec .apec-strip__name { font-size: .75rem; color: var(--muted); }
#apec .apec-strip__desc {
  width: 100%; color: var(--muted); font-size: .78rem;
  padding-top: .3rem; margin-top: .2rem;
  border-top: 1px solid rgba(45,62,170,.12);
}

/* ---- INFO CARDS ----------------------------------------------------- */
#apec .apec-infocard {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 1.25rem;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--sh-sm);
}
#apec .apec-infocard--teal { border-left: 4px solid var(--p2); }
#apec .apec-infocard--amber { border-left: 4px solid var(--amber); }

#apec .apec-infocard__icon {
  width: 48px; height: 48px;
  display: grid; place-items: center;
  background: var(--p5); color: var(--p2);
  border-radius: var(--r-md); flex-shrink: 0;
}
#apec .apec-infocard__icon--amber { background: var(--amberb); color: var(--amber); }

#apec .apec-infocard__body h2 {
  font-size: 1.02rem; font-weight: 700; color: var(--ink);
  margin: 0 0 .8rem; line-height: 1.3;
}
#apec .apec-infocard__text p {
  font-size: .875rem; line-height: 1.75;
  color: var(--muted); margin: 0 0 .7rem;
}
#apec .apec-infocard__text ul {
  margin: .4rem 0 .75rem 1.25rem; padding: 0;
}
#apec .apec-infocard__text li {
  font-size: .855rem; line-height: 1.7;
  color: var(--muted); margin-bottom: .35rem;
}
#apec .apec-infocard__note {
  background: rgba(45,62,170,.05);
  border-left: 3px solid var(--p2);
  padding: .6rem .85rem;
  border-radius: 0 6px 6px 0;
  font-size: .855rem; color: var(--ink2);
  margin-top: .5rem;
}
#apec .apec-infocard--amber .apec-infocard__note {
  background: rgba(201,122,0,.05);
  border-left-color: var(--amber);
  color: var(--amberd);
}

/* Expandable Info Card (OC Explanation) */
#apec .apec-infocard-details {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  margin-bottom: 1.5rem;
  box-shadow: var(--sh-sm);
}
#apec .apec-infocard-details.apec-infocard--teal {
  border-left: 4px solid var(--p2);
}
#apec .apec-infocard-details__summary {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem; cursor: pointer; list-style: none;
}
#apec .apec-infocard-details__summary::-webkit-details-marker { display: none; }
#apec .apec-infocard-details__left {
  display: flex; align-items: center; gap: 1.25rem;
}
#apec .apec-infocard-details__left h2 {
  font-size: 1.02rem; font-weight: 700; color: var(--ink); margin: 0; line-height: 1.3;
}
#apec .apec-details-chevron {
  color: var(--muted); transition: transform 0.2s; flex-shrink: 0; margin-left: 1rem;
}
#apec .apec-infocard-details[open] .apec-details-chevron {
  transform: rotate(180deg);
}
#apec .apec-infocard-details__body {
  padding: 0 1.5rem 1.5rem calc(1.5rem + 48px + 1.25rem); /* align with text */
}
@media (max-width: 640px) {
  #apec .apec-infocard-details__summary { padding: 1.25rem; }
  #apec .apec-infocard-details__left { gap: .75rem; }
  #apec .apec-infocard-details__body { padding: 0 1.25rem 1.25rem; }
}

/* ---- TABLE TOOLBAR -------------------------------------------------- */
#apec .apec-toolbar {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: .75rem;
  margin-bottom: .85rem;
}
#apec .apec-toolbar__left {
  display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
}
#apec .apec-result-badge {
  background: var(--p5); color: var(--p1);
  border: 1px solid var(--p4);
  padding: 4px 14px; border-radius: 9999px;
  font-size: .82rem; font-weight: 500;
}
#apec .apec-cache-tag {
  background: var(--bg2); color: var(--muted2);
  border: 1px solid var(--bdr);
  padding: 3px 10px; border-radius: 9999px;
  font-size: .72rem;
}
#apec .apec-toolbar__right {
  display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
}
#apec .apec-search-box {
  display: flex; align-items: center; gap: .5rem;
  padding: 7px 13px;
  background: var(--surf);
  border: 1.5px solid var(--bdr2);
  border-radius: var(--r-md);
  min-width: 230px;
  transition: border-color .2s;
}
#apec .apec-search-box:focus-within { border-color: var(--p2); }
#apec .apec-search-box svg { color: var(--muted); flex-shrink: 0; }
#apec #tableSearch {
  border: none; outline: none; width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: .875rem; color: var(--ink); background: transparent;
}
#apec #tableSearch::placeholder { color: var(--muted2); }
/* ---- TABLE WRAPPER + STICKY HEADER (DESKTOP) ----------------------- */
#apec .apec-table-wrap {
  overflow: visible; /* Enables window-level sticky header */
  border-radius: var(--r-md);
  border: 1px solid var(--bdr);
  box-shadow: var(--sh-md);
  background: var(--surf);
  margin-bottom: 1.5rem;
  position: relative;
}

@media (min-width: 641px) {
  #apec .apec-table thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, var(--p0) 0%, var(--p1) 45%, var(--p2) 100%);
  }
  #apec .apec-table thead th:first-child { border-top-left-radius: var(--r-md); }
  #apec .apec-table thead th:last-child { border-top-right-radius: var(--r-md); }
}

#apec .apec-table {
  width: 100%; border-collapse: collapse;
  font-size: .85rem;
  /* Copy protection */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
#apec .apec-table *::selection  { background: transparent; }
#apec .apec-table *::-moz-selection { background: transparent; }

/* Table head */
#apec .apec-table thead {
  background: linear-gradient(135deg, var(--p0) 0%, var(--p1) 45%, var(--p2) 100%);
}
#apec .apec-table th {
  padding: 13px 14px; text-align: left;
  color: rgba(255,255,255,.9);
  font-size: .72rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  white-space: nowrap;
}
#apec .apec-table th.sortable { cursor: pointer; }
#apec .apec-table th.sortable:hover { background: rgba(255,255,255,.08); }
#apec .apec-table th.th-active-sort { color: #fcd34d; }

/* Sort icons */
#apec .sort-ico {
  width: 10px; height: 14px;
  display: inline-block; vertical-align: middle; margin-left: 3px;
  position: relative; top: -1px;
}
#apec .sort-up, #apec .sort-down {
  opacity: 0.35;
  fill: rgba(255,255,255,.8);
  transition: opacity 0.2s, fill 0.2s;
}
#apec .th-active-sort.sort-asc .sort-up {
  opacity: 1;
  fill: #fcd34d;
}
#apec .th-active-sort.sort-desc .sort-down {
  opacity: 1;
  fill: #fcd34d;
}

/* Table body */
#apec .apec-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--bdr);
  vertical-align: middle;
}
#apec .apec-table tbody tr:last-child td { border-bottom: none; }
#apec .apec-table tbody tr:hover td { background: var(--p5); }

/* Tier highlights */
#apec .apec-table tbody tr.tr-gold td { background: linear-gradient(90deg, #fffbeb 0%, #fffff8 80%, transparent 100%); }
#apec .apec-table tbody tr.tr-gold td:first-child { border-left: 3px solid var(--saffron-bright); }
#apec .apec-table tbody tr.tr-gold:hover td { background: #fef9e0; }
#apec .apec-table tbody tr.tr-teal td:first-child { border-left: 3px solid rgba(45,62,170,.25); }

/* Rank indicators */
#apec .apec-rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem; font-weight: 600;
}
#apec .apec-rank--gold {
  background: linear-gradient(135deg, #c89400, var(--gold));
  color: #fff;
  box-shadow: 0 2px 7px rgba(184,134,11,.4);
}
#apec .apec-rank--teal {
  background: linear-gradient(135deg, var(--p2), var(--p3));
  color: #fff;
}
#apec .apec-rank-plain {
  font-size: .78rem; color: var(--muted2);
  font-variant-numeric: tabular-nums;
}

/* College name cell */
#apec .apec-cname {
  display: block; font-weight: 600; color: var(--ink2);
  line-height: 1.4; max-width: 310px;
}
#apec .apec-ccode-mob {
  display: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem; color: var(--muted2);
  background: var(--bg2); padding: 1px 6px;
  border-radius: 4px; margin-top: 4px;
}

/* Code cell */
#apec .apec-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem;
  background: var(--bg2); color: var(--p1);
  padding: 2px 7px; border-radius: 5px;
  border: 1px solid var(--bdr);
}

/* Status badges */
#apec .apec-status-stack { display: flex; flex-direction: column; gap: 3px; }
#apec .apec-sb {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 9999px;
  font-size: .67rem; font-weight: 700;
  white-space: nowrap; width: fit-content;
}
#apec .sb-purple { background: var(--purpb); color: var(--purp); }
#apec .sb-green  { background: var(--greenb); color: var(--green); }
#apec .sb-blue   { background: var(--blueb); color: var(--blue); }
#apec .sb-gold   { background: var(--goldb); color: var(--goldd); }
#apec .sb-gray   { background: var(--bg2); color: var(--muted); border: 1px solid var(--bdr); }
#apec .apec-muted { color: var(--muted2); font-size: .78rem; }

/* NAAC badges */
#apec .apec-naac {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 38px; padding: 3px 8px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem; font-weight: 700;
}
#apec .naac-app  { background: #022c22; color: #34d399; }
#apec .naac-ap   { background: #14532d; color: #86efac; }
#apec .naac-a    { background: var(--greenb); color: var(--green); }
#apec .naac-bpp  { background: #1e3a5f; color: #93c5fd; }
#apec .naac-bp   { background: var(--blueb); color: var(--blue); }
#apec .naac-b    { background: #eff6ff; color: #3b82f6; }
#apec .naac-c    { background: #fef3c7; color: #92400e; }
#apec .naac-na   { background: var(--bg2); color: var(--muted2); }

/* Rank cells */
#apec .apec-rank-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem; font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
#apec .rank-median { color: var(--p2); }
#apec .rank-close  { color: var(--red); }

/* Branch codes cell */
#apec .apec-bcodes { display: flex; flex-wrap: wrap; gap: 3px; }
#apec .apec-bcode {
  padding: 2px 6px;
  background: var(--p5); color: var(--p1);
  border-radius: 4px; cursor: help;
  font-family: 'JetBrains Mono', monospace;
  font-size: .67rem; font-weight: 600;
}

/* Mobile-only elements */
#apec .apec-mob-stats { display: none; }
#apec .apec-mob-expander { display: none; }
#apec .apec-mob-details { display: none; }

/* ---- EMPTY STATES --------------------------------------------------- */
#apec .apec-empty {
  text-align: center; padding: 3rem 2rem;
  border: 2px dashed var(--bdr2);
  border-radius: var(--r-xl);
  background: var(--bg); margin: 1.5rem 0;
}
#apec .apec-empty--warn { border-color: #fcd34d; background: #fffde7; }
#apec .apec-empty__icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 68px; height: 68px;
  background: var(--p5); color: var(--p2);
  border-radius: 50%; margin-bottom: 1.25rem;
}
#apec .apec-empty__icon--warn { background: #fef3c7; color: #b45309; }
#apec .apec-empty h3 {
  font-size: 1.2rem; font-weight: 700; color: var(--ink); margin: 0 0 .5rem;
}
#apec .apec-empty p {
  font-size: .875rem; color: var(--muted);
  max-width: 500px; margin: 0 auto 1.25rem; line-height: 1.6;
}
#apec .apec-empty__hints {
  list-style: none; margin: 0 auto; padding: 0;
  max-width: 420px; text-align: left;
}
#apec .apec-empty__hints li {
  font-size: .83rem; color: var(--muted);
  padding: .35rem 0 .35rem 1.35rem; position: relative;
}
#apec .apec-empty__hints li::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  background: var(--p2); border-radius: 50%;
}
#apec .apec-filter-empty {
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  padding: 1.5rem; font-size: .875rem; color: var(--muted);
  background: var(--bg); border-radius: var(--r-md); margin-bottom: 1rem;
}

/* ---- INSIGHTS GRID -------------------------------------------------- */
#apec .apec-insights {
  margin: 2rem 0 1.5rem;
}
#apec .apec-insights-header {
  display: flex; align-items: center; gap: .5rem;
  margin-bottom: .85rem;
}
#apec .apec-insights-header svg { color: var(--p2); }
#apec .apec-insights-header h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink); margin: 0;
}
#apec .apec-ins-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
}
#apec .apec-ins-card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-md);
  padding: 1rem 1.1rem;
  box-shadow: var(--sh-xs);
  display: flex; flex-direction: column; gap: .25rem;
  position: relative; overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
#apec .apec-ins-card:hover {
  box-shadow: var(--sh-sm); transform: translateY(-2px);
}
#apec .apec-ins-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
#apec .apec-ins-card--indigo::before { background: linear-gradient(90deg, var(--p2), var(--p3)); }
#apec .apec-ins-card--gold::before { background: linear-gradient(90deg, var(--gold), #e0a800); }
#apec .apec-ins-card--blue::before { background: linear-gradient(90deg, var(--blue), #6ea8fe); }
#apec .apec-ins-card--amber::before { background: linear-gradient(90deg, var(--amber), #f59e0b); }

#apec .apec-ins-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem; font-weight: 700;
  color: var(--ink); line-height: 1;
  font-variant-numeric: tabular-nums;
}
#apec .apec-ins-val--indigo { color: var(--p2); }
#apec .apec-ins-val--gold { color: var(--gold); }
#apec .apec-ins-val--blue { color: var(--blue); }
#apec .apec-ins-val--amber { color: var(--amber); }
#apec .apec-ins-lbl {
  font-size: .7rem; color: var(--muted); font-weight: 500;
}
#apec .apec-ins-sub {
  font-size: .65rem; color: var(--muted2);
}

/* ---- FAQ SECTION ---------------------------------------------------- */
#apec .apec-faq {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  margin: 1.5rem 0;
  box-shadow: var(--sh-sm);
}
#apec .apec-faq-header {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: 1rem;
  padding-bottom: .85rem;
  border-bottom: 2px solid var(--p5);
}
#apec .apec-faq-header svg { color: var(--p2); flex-shrink: 0; }
#apec .apec-faq-header h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink); margin: 0;
}
#apec .apec-faq-item { border-bottom: 1px solid var(--bg2); }
#apec .apec-faq-item:last-child { border-bottom: none; }
#apec .apec-faq-item summary {
  padding: .85rem 0;
  cursor: pointer;
  font-weight: 600; font-size: .85rem;
  color: var(--ink);
  display: flex; align-items: center; justify-content: space-between; gap: .75rem;
  list-style: none;
  transition: color .15s;
}
#apec .apec-faq-item summary::-webkit-details-marker { display: none; }
#apec .apec-faq-item[open] summary { color: var(--p2); }
#apec .apec-faq-q-text { flex: 1; }
#apec .apec-faq-icon {
  width: 20px; height: 20px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--bg2); color: var(--muted);
  flex-shrink: 0;
  transition: background .15s, color .15s, transform .25s cubic-bezier(.4,0,.2,1);
}
#apec .apec-faq-item[open] .apec-faq-icon {
  background: var(--p5); color: var(--p2);
  transform: rotate(45deg);
}
#apec .apec-faq-body {
  padding: 0 0 .85rem;
  font-size: .83rem; line-height: 1.7;
  color: var(--muted);
  animation: apecFaqIn .2s ease;
}
@keyframes apecFaqIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
#apec .apec-faq-body p { margin: 0 0 .5rem; }
#apec .apec-faq-body p:last-child { margin-bottom: 0; }
#apec .apec-faq-body ul { margin: .3rem 0 .5rem 1.25rem; padding: 0; }
#apec .apec-faq-body li { margin-bottom: .25rem; }
#apec .apec-faq-body strong { color: var(--ink2); }

/* ---- BRANCH NAV ----------------------------------------------------- */
#apec .apec-branch-nav {
  background: linear-gradient(135deg, var(--p5) 0%, #eef0fd 100%);
  border: 1px solid var(--p4);
  border-radius: var(--r-lg);
  padding: 1.25rem 1.5rem;
  margin: 1.5rem 0;
}
#apec .apec-branch-nav h2 {
  font-size: .8rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--p1);
  margin: 0 0 .85rem;
}
#apec .apec-bnav-grid { display: flex; flex-wrap: wrap; gap: .5rem; }
#apec .apec-bnav-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 5px;
  background: var(--surf);
  border: 1px solid var(--bdr2);
  border-radius: 9999px;
  text-decoration: none;
  font-size: .75rem; font-weight: 500;
  color: var(--ink2);
  transition: all .15s;
}
#apec .apec-bnav-link:hover {
  background: var(--p5); border-color: var(--p2);
  color: var(--p2); transform: translateY(-1px);
  box-shadow: var(--sh-xs);
}
#apec .apec-bnav-link.is-active {
  background: var(--p2); border-color: var(--p1);
  color: #fff; cursor: default; transform: none;
}
#apec .apec-bnav-link.is-active:hover { background: var(--p2); box-shadow: none; }
#apec .apec-bnav-code {
  background: rgba(0,0,0,.08);
  border-radius: 9999px; padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .63rem; font-weight: 700;
}
#apec .apec-bnav-link.is-active .apec-bnav-code { background: rgba(255,255,255,.2); }

/* ---- SEO SECTION ---------------------------------------------------- */
#apec .apec-seo {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  margin: 1.5rem 0;
}
#apec .apec-seo h2 {
  font-size: .95rem; font-weight: 700; color: var(--ink);
  margin: 0 0 .75rem; padding-bottom: .6rem;
  border-bottom: 2px solid var(--p5);
}
#apec .apec-seo-body p {
  font-size: .83rem; line-height: 1.7;
  color: var(--muted); margin: 0 0 .6rem;
}
#apec .apec-seo-body a { color: var(--p2); }
#apec .apec-seo-body em { font-size: .75rem; opacity: .8; }

/* ---- RESPONSIVE ----------------------------------------------------- */
@media (max-width: 1024px) {
  #apec .apec-ins-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 900px) {
  #apec .apec-hero-body { grid-template-columns: 1fr; }
  #apec .apec-stat-card { display: none; }
  #apec .apec-hero-text h1 { font-size: 1.9rem; }
}

@media (max-width: 640px) {
  #apec .apec-hero { padding: 2rem 0 3rem; }
  #apec .apec-hero-text h1 { font-size: 1.55rem; }
  #apec .apec-hero-branch { font-size: 1.4rem; }

  #apec .apec-selector-card { padding: 1.25rem; border-radius: var(--r-lg); }
  #apec .apec-select__list { max-height: 260px; }

  #apec .apec-toolbar { flex-direction: column; align-items: flex-start; }
  #apec .apec-toolbar__right { width: 100%; flex-direction: column; align-items: flex-start; }
  #apec .apec-search-box { min-width: unset; width: 100%; }

  #apec .apec-infocard { grid-template-columns: 1fr; gap: .75rem; }
  #apec .apec-infocard__icon { width: 40px; height: 40px; }

  #apec .apec-strip { flex-direction: column; align-items: flex-start; }
  #apec .apec-seo { padding: 1.25rem; }

  /* Insights */
  #apec .apec-ins-grid { grid-template-columns: repeat(2, 1fr); gap: .6rem; }
  #apec .apec-ins-val { font-size: 1.2rem; }

  /* ============================================================
     TABLE -> CARD TRANSFORMATION
     ============================================================ */
  #apec .apec-table-wrap {
    overflow:      visible !important;
    background:    transparent;
    border:        none;
    box-shadow:    none;
    border-radius: 0;
  }

  #apec .apec-table { display: block; width: 100%; }
  #apec .apec-table thead { display: none; }
  #apec .apec-table tbody { display: flex; flex-direction: column; gap: 8px; }

  #apec .apec-table tbody tr {
    display:        flex !important;
    align-items:    flex-start;
    background:     var(--surf);
    border:         1.5px solid var(--bdr);
    border-radius:  var(--r-md);
    overflow:       hidden;
    box-shadow:     var(--sh-xs);
    transition:     box-shadow .2s ease, border-color .2s ease;
  }
  #apec .apec-table tbody tr.tr-gold {
    border-color: rgba(184,134,11,.45);
    border-left:  3px solid var(--saffron-bright) !important;
    background:   linear-gradient(120deg, #fffdf5 0%, var(--surf) 60%);
  }
  #apec .apec-table tbody tr.tr-teal {
    border-left: 3px solid rgba(45,62,170,.35) !important;
  }
  #apec .apec-table tbody tr.is-expanded {
    border-color: var(--p3);
    box-shadow:   var(--sh-sm);
  }
  #apec .apec-table tbody tr:hover td { background: transparent !important; }

  #apec .apec-table tbody td {
    display:  none !important;
    border:   none !important;
    padding:  0 !important;
  }

  #apec .apec-table tbody td.col-rank {
    display:      flex !important;
    align-items:  flex-start;
    padding:      11px 0 11px 11px !important;
    flex-shrink:  0;
    width:        40px;
  }

  #apec .apec-table tbody td.col-name {
    display:   block !important;
    flex:      1;
    min-width: 0;
    padding:   11px 11px 11px 6px !important;
  }

  #apec .apec-cname {
    max-width:   100%;
    font-size:   .85rem;
    line-height: 1.3;
    display:     block;
  }

  #apec .apec-cname-wrap {
    display:         flex;
    align-items:     flex-start;
    justify-content: space-between;
    gap:             8px;
  }

  #apec .apec-mob-expander {
    display:         flex !important;
    align-items:     center;
    justify-content: center;
    flex-shrink:     0;
    width:           28px;
    height:          28px;
    background:      var(--bg2);
    border:          1px solid var(--bdr);
    border-radius:   6px;
    cursor:          pointer;
    color:           var(--muted);
    transition:      background .15s, border-color .15s, color .15s;
    margin-top:      1px;
  }
  #apec .apec-mob-expander svg {
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  #apec .apec-table tr.is-expanded .apec-mob-expander {
    background:   var(--p5);
    border-color: var(--p2);
    color:        var(--p2);
  }
  #apec .apec-table tr.is-expanded .apec-mob-expander svg {
    transform: rotate(180deg);
  }

  #apec .apec-mob-stats {
    display:     flex !important;
    align-items: center;
    gap:         6px;
    margin-top:  6px;
    flex-wrap:   wrap;
  }
  #apec .apec-code-mob {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem; font-weight: 700;
    background: var(--bg2); color: var(--p1);
    padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--bdr);
  }
  #apec .apec-ms-ranks {
    display:     flex;
    align-items: center;
    gap:         5px;
    flex-wrap:   wrap;
  }
  #apec .apec-ms-item { display: flex; align-items: baseline; gap: 4px; }
  #apec .apec-ms-lbl {
    font-size:      .65rem;
    color:          var(--muted);
    font-weight:    500;
  }
  #apec .apec-ms-v {
    font-family:          'JetBrains Mono', monospace;
    font-size:            .78rem;
    font-weight:          700;
    font-variant-numeric: tabular-nums;
  }
  #apec .apec-ms-median .apec-ms-v { color: var(--p2); }

  #apec .apec-mob-details {
    display:    block !important;
    overflow:   hidden;
    max-height: 0;
    opacity:    0;
    transition: max-height .32s cubic-bezier(.4,0,.2,1),
                opacity .22s ease,
                margin-top .22s ease;
    margin-top: 0;
  }
  #apec .apec-table tr.is-expanded .apec-mob-details {
    max-height: 360px;
    opacity:    1;
    margin-top: 8px;
  }

  #apec .apec-mob-details-inner {
    background:    var(--bg2);
    border-radius: var(--r-sm);
    padding:       8px 10px;
  }
  #apec .apec-md-item {
    display:       flex;
    align-items:   flex-start;
    gap:           8px;
    font-size:     .8rem;
    padding:       6px 0;
    border-bottom: 1px solid rgba(208,213,240,.6);
  }
  #apec .apec-md-item:last-child { border-bottom: none; padding-bottom: 2px; }
  #apec .apec-md-lbl {
    color:      var(--muted);
    font-weight: 600;
    min-width:  95px;
    font-size:  .74rem;
    padding-top: 1px;
  }
  #apec .apec-md-val { flex: 1; min-width: 0; }

  #apec .apec-rank { width: 22px; height: 22px; font-size: .65rem; }
  #apec .apec-rank-plain { font-size: .72rem; }
}

@media (max-width: 400px) {
  #apec .apec-hero-text h1 { font-size: 1.35rem; }
  #apec .apec-hero-branch { font-size: 1.2rem; }
  #apec .apec-wrap { padding: 0 1rem; }
}

/* ---- PRINT STYLES --------------------------------------------------- */
@media print {
  /* Hide interactive sections */
  .apec-table-wrap,
  .apec-toolbar,
  .apec-skip,
  .apec-insights,
  .apec-faq,
  .apec-branch-nav {
    display: none !important;
  }

  /* Hide empty states if they print */
  .apec-empty,
  .apec-filter-empty {
    display: none !important;
  }
}


#ev-footer {
  --evf-bg:      #070f2b;
  --evf-bg2:     #0d1b4b;
  --evf-text:    rgba(255,255,255,.5);
  --evf-head:    #ffffff;
  --evf-link:    rgba(255,255,255,.55);
  --evf-accent:  #00c6b8;
  --evf-gold:    #f59e0b;
  --evf-border:  rgba(255,255,255,.07);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
 
#ev-footer .evf-wrap {
  background: var(--evf-bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% 0%, rgba(0,198,184,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5% 100%, rgba(14,79,138,.25) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
  padding: 5rem 0 0;
}
 
/* Decorative line at top */
#ev-footer .evf-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,198,184,.4), rgba(14,79,138,.4), transparent);
}
 
/* Top grid */
#ev-footer .evf-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  position: relative;
  z-index: 1;
}
@media (max-width: 991px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
}
@media (max-width: 575px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr; gap: 1.75rem; }
}
 
/* Brand */
#ev-footer .evf-brand {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Sora', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--evf-head);
  text-decoration: none;
  margin-bottom: .75rem;
  transition: opacity .2s;
}
#ev-footer .evf-brand:hover { opacity: .85; }
#ev-footer .evf-brand-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--evf-accent), #0891b2);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
 
#ev-footer .evf-tagline {
  font-size: .9rem; line-height: 1.7;
  color: var(--evf-text);
  margin-bottom: 1.5rem;
  max-width: 280px;
}
 
/* Trust badge */
#ev-footer .evf-trust {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--evf-border);
  border-radius: 100px;
  padding: .5rem 1.1rem;
  text-decoration: none;
  font-size: .8rem; font-weight: 600;
  color: var(--evf-text);
  transition: border-color .2s, color .2s, background .2s;
  margin-bottom: .75rem;
}
#ev-footer .evf-trust:hover {
  border-color: var(--evf-accent);
  color: var(--evf-accent);
  background: rgba(0,198,184,.05);
}
#ev-footer .evf-trust-dot {
  width: 8px; height: 8px;
  background: #10b981;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.2);
  animation: evfPulse 2.5s infinite;
}
@keyframes evfPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.2); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,.08); }
}
 
/* Column heading */
#ev-footer .evf-col-head {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--evf-accent);
  margin-bottom: 1.2rem;
}
 
/* Link list */
#ev-footer .evf-list { list-style: none; padding: 0; margin: 0; }
#ev-footer .evf-list li { margin-bottom: .6rem; }
#ev-footer .evf-link {
  display: inline-flex; align-items: center; gap: .5rem;
  color: var(--evf-link);
  text-decoration: none;
  font-size: .9rem; font-weight: 500;
  transition: color .18s, gap .18s;
}
#ev-footer .evf-link i {
  font-size: .65rem; color: var(--evf-accent);
  opacity: 0; transform: translateX(-4px);
  transition: opacity .18s, transform .18s;
}
#ev-footer .evf-link:hover { color: #fff; gap: .65rem; }
#ev-footer .evf-link:hover i { opacity: 1; transform: translateX(0); }
 
/* Divider */
#ev-footer .evf-hr {
  border: none;
  border-top: 1px solid var(--evf-border);
  margin: 3rem 0 1.5rem;
  position: relative;
  z-index: 1;
}
 
/* Bottom bar */
#ev-footer .evf-bottom {
  display: flex; align-items: center;
  justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
  padding-bottom: 2.5rem;
  position: relative; z-index: 1;
}
#ev-footer .evf-copy {
  font-size: .85rem; color: var(--evf-text); margin: 0;
}
#ev-footer .evf-copy a { color: var(--evf-accent); text-decoration: none; }
#ev-footer .evf-copy a:hover { text-decoration: underline; }
 
#ev-footer .evf-credits {
  display: flex; align-items: center; gap: .65rem;
  font-size: .8rem; color: rgba(255,255,255,.3);
}
#ev-footer .evf-credits a { color: rgba(255,255,255,.42); text-decoration: none; transition: color .2s; }
#ev-footer .evf-credits a:hover { color: #fff; }



/*
 * ── Scroll-to-top: ALL tokens scoped to the component ─────────────────────
