/* ── HERO ───────────────────────────────────────────────── */
.tgecet-hero {
  background: linear-gradient(135deg, #0a1f1d 0%, #0a6e64 50%, #107066 100%);
  position: relative;
  overflow: hidden;
  padding: 1rem 0 0;
}
.tgecet-hero::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(163,230,53,0.12) 0%, transparent 70%);
  top: -150px; right: -150px;
  pointer-events: none;
}
.tgecet-hero::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(92,246,231,0.25) 0%, transparent 70%);
  bottom: 20px; left: -80px;
  pointer-events: none;
}
.tgecet-hero-inner {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
  align-items: start;
}
@media (min-width: 900px) {
  .tgecet-hero-inner {
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 3rem;
    padding-bottom: 3rem;
  }
}

/* Hero text */
.tgecet-hero-text { color: #fff; }

.tgecet-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(163, 230, 53, 0.18);
  color: var(--e-lime);
  border: 1px solid rgba(163, 230, 53, 0.35);
  border-radius: 99px;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.35rem 0.9rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

/* Visible page title */
.tgecet-page-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: clamp(1.65rem, 5vw, 2.6rem);
  font-weight: 800;
  line-height: 1.12;
  color: #fff;
  margin: 0 0 0.6rem;
  letter-spacing: -0.025em;
}
.tgecet-page-title .accent { color: var(--e-lime); }

.tgecet-hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.65);
  font-weight: 500;
  margin: 0 0 1.1rem;
  font-family: 'DM Sans', sans-serif;
}

.tgecet-hero-lead {
  font-size: 0.96rem;
  color: rgba(255,255,255,0.72);
  line-height: 1.65;
  margin-bottom: 1.75rem;
  max-width: 480px;
}

.tgecet-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tgecet-hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 99px;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.3rem 0.85rem;
}

/* ── FORM CARD ──────────────────────────────────────────── */
.tgecet-form-card {
  background: #FFFFFF;
  border-radius: var(--e-radius-xl);
  box-shadow: 0 24px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
  padding: 2rem;
  position: relative;
  z-index: 3;
}

.tgecet-form-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--e-indigo);
  margin: 0 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.tgecet-form-title .icon-dot {
  width: 10px; height: 10px;
  background: var(--e-lime);
  border-radius: 50%;
  display: inline-block;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

/* Form grid */
.tgecet-form-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
@media (min-width: 480px) {
  .tgecet-form-grid { grid-template-columns: 1fr 1fr; }
  .tgecet-col-full { grid-column: 1 / -1; }
}

.tgecet-field label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--e-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.45rem;
}
.tgecet-field .field-required {
  color: #DC2626;
  margin-left: 2px;
}

.tgecet-field input,
.tgecet-field select {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 2px solid #E5E7EB;
  border-radius: var(--e-radius-sm);
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  color: var(--e-text);
  background: #FAFAFA;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
}
.tgecet-field input:focus,
.tgecet-field select:focus {
  border-color: var(--e-violet);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(33,182,167, 0.1);
}
.tgecet-field input::placeholder { color: var(--e-text-light); }

.tgecet-field input.input-error,
.tgecet-field select.input-error {
  border-color: #DC2626;
  box-shadow: 0 0 0 4px rgba(220,38,38,0.08);
}

.tgecet-rank-input {
  font-size: 1.4rem !important;
  font-weight: 700 !important;
  font-family: 'Bricolage Grotesque', sans-serif !important;
  color: var(--e-indigo) !important;
  text-align: center;
  letter-spacing: -0.02em;
}

.tgecet-field-error {
  font-size: 0.75rem;
  color: #DC2626;
  margin-top: 0.3rem;
  display: none;
}
.tgecet-field-error.visible { display: block; }

/* Select2 override */
.tgecet-root .select2-container--default .select2-selection--multiple {
  border: 2px solid #E5E7EB;
  border-radius: var(--e-radius-sm);
  min-height: 48px;
  background: #FAFAFA;
  padding: 4px 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.tgecet-root .select2-container--default.select2-container--focus .select2-selection--multiple {
  border-color: var(--e-violet);
  box-shadow: 0 0 0 4px rgba(33,182,167,0.1);
  background: #fff;
}
.tgecet-root .select2-container--default .select2-selection--multiple.select2-error {
  border-color: #DC2626;
}
.tgecet-root .select2-container--default .select2-selection--multiple .select2-selection__choice {
  background: var(--e-surface-soft);
  border: 1px solid var(--e-border-strong);
  color: var(--e-violet);
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 2px 10px;
}
.tgecet-root .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
  color: var(--e-violet);
}

/* Submit button */
.tgecet-submit {
  width: 100%;
  padding: 0.95rem 1.5rem;
  background: linear-gradient(135deg, var(--e-indigo) 0%, var(--e-violet) 100%);
  color: #fff;
  border: none;
  border-radius: var(--e-radius-sm);
  font-size: 1rem;
  font-weight: 700;
  font-family: 'Bricolage Grotesque', sans-serif;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  position: relative;
  overflow: hidden;
}
.tgecet-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
}
.tgecet-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(33,182,167,0.35); }
.tgecet-submit:active { transform: translateY(0); }

/* ── WAVE ───────────────────────────────────────────────── */
.tgecet-wave { display: block; width: 100%; overflow: hidden; line-height: 0; margin-top: -1px; }
.tgecet-wave svg { display: block; width: 100%; }

/* ── RESULTS SECTION ────────────────────────────────────── */
.tgecet-results {
  background: var(--e-surface-alt);
  padding: 2rem 0 3rem;
}
.tgecet-results-header { margin-bottom: 1.5rem; }
.tgecet-results-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--e-indigo);
  margin: 0 0 0.5rem;
}
.tgecet-results-meta { font-size: 0.88rem; color: var(--e-text-muted); }

/* Search bar */
.tgecet-search-bar { position: relative; margin-bottom: 1.25rem; }
.tgecet-search-bar input {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.75rem;
  border: 2px solid #E5E7EB;
  border-radius: var(--e-radius-sm);
  font-size: 0.92rem;
  font-family: 'DM Sans', sans-serif;
  color: var(--e-text);
  background: #fff;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.tgecet-search-bar input:focus {
  border-color: var(--e-violet);
  box-shadow: 0 0 0 4px rgba(33,182,167,0.1);
}
.tgecet-search-bar .search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--e-text-light);
  font-size: 1rem;
}

/* Eligible category chips */
.tgecet-cat-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--e-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.6rem;
}
.tgecet-cat-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
.tgecet-cat-chip {
  display: inline-flex;
  align-items: center;
  padding: 0.3rem 0.75rem;
  background: var(--e-surface-soft);
  color: var(--e-violet);
  border: 1px solid var(--e-border-strong);
  border-radius: 99px;
  font-size: 0.8rem;
  font-weight: 600;
}

/* Sort/filter toolbar */
.tgecet-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.tgecet-count-badge {
  background: var(--e-indigo);
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.25rem 0.75rem;
  border-radius: 99px;
  font-family: 'Bricolage Grotesque', sans-serif;
}
.tgecet-sort-btns { display: flex; gap: 0.4rem; }
.tgecet-sort-btn {
  padding: 0.3rem 0.8rem;
  border: 1.5px solid #E5E7EB;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--e-text-muted);
  background: #fff;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.tgecet-sort-btn.active, .tgecet-sort-btn:hover {
  border-color: var(--e-violet);
  color: var(--e-violet);
  background: var(--e-surface-soft);
}

/* ── DESKTOP TABLE ──────────────────────────────────────── */
.tgecet-result-table-wrap {
  overflow-x: auto;
  border: 1.5px solid var(--e-border);
  border-radius: var(--e-radius-md);
  background: #fff;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.tgecet-result-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}

.tgecet-result-table thead tr {
  background: linear-gradient(135deg, var(--e-indigo), var(--e-violet));
  color: #fff;
}
.tgecet-result-table thead th {
  padding: 0.85rem 1rem;
  text-align: left;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
}
.tgecet-result-table thead th.th-rank { text-align: right; }
.tgecet-result-table thead th.th-action { text-align: center; }

.tgecet-result-table tbody tr {
  border-bottom: 1px solid #eafaf8;
  transition: background 0.12s;
}
.tgecet-result-table tbody tr:last-child { border-bottom: none; }
.tgecet-result-table tbody tr:hover { background: #f5fffe; }

.tgecet-result-table tbody td {
  padding: 0.8rem 1rem;
  color: var(--e-text);
  vertical-align: middle;
}
.tgecet-result-table tbody td.td-rank {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--e-indigo);
  text-align: right;
  white-space: nowrap;
}
.tgecet-result-table tbody td.td-action { text-align: center; }

.tgecet-tbl-college-code {
  display: inline-block;
  background: var(--e-indigo);
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.25rem 0.6rem;
  border-radius: 7px;
  font-family: 'Bricolage Grotesque', sans-serif;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.tgecet-tbl-branch-code {
  display: inline-block;
  background: var(--e-surface-soft);
  color: var(--e-violet);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.25rem 0.6rem;
  border-radius: 7px;
  border: 1px solid var(--e-border);
  white-space: nowrap;
}

.tgecet-tbl-category {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.2rem 0.6rem;
  border-radius: 99px;
  background: #e9fefc;
  color: var(--e-violet);
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.tgecet-tbl-view-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--e-violet);
  background: var(--e-surface-soft);
  border: 1.5px solid var(--e-border);
  border-radius: 8px;
  padding: 0.3rem 0.8rem;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tgecet-tbl-view-btn:hover {
  background: #e9fefc;
  border-color: var(--e-violet);
  color: var(--e-violet);
}

.tgecet-tbl-college-name {
  font-weight: 600;
  color: var(--e-text);
  font-size: 0.88rem;
  line-height: 1.3;
  max-width: 280px;
}
.tgecet-tbl-branch-name {
  font-size: 0.83rem;
  color: var(--e-text-muted);
  max-width: 200px;
}

.tgecet-tbl-sr {
  color: var(--e-text-light);
  font-size: 0.8rem;
  font-weight: 600;
  font-family: 'Bricolage Grotesque', sans-serif;
}

/* Branch rank label in table header */
.th-rank-label { font-size: 0.65rem; opacity: 0.8; display: block; font-weight: 500; letter-spacing: 0.03em; }

/* ── MOBILE CARDS ───────────────────────────────────────── */
.tgecet-card-list { display: flex; flex-direction: column; gap: 0.75rem; }

.tgecet-result-card {
  background: #fff;
  border: 1.5px solid #eafaf8;
  border-radius: var(--e-radius-md);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.tgecet-result-card:hover { border-color: var(--e-border-strong); box-shadow: 0 4px 16px rgba(33,182,167,0.08); }
.tgecet-result-card.expanded { border-color: var(--e-violet); box-shadow: 0 6px 24px rgba(33,182,167,0.12); }

.tgecet-card-summary {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  align-items: center;
  gap: 0.6rem;
  padding: 0.9rem 1rem;
}

.tgecet-code-badge {
  background: var(--e-indigo);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 0.3rem 0.65rem;
  border-radius: 8px;
  font-family: 'Bricolage Grotesque', sans-serif;
  white-space: nowrap;
}
.tgecet-branch-badge {
  background: var(--e-surface-soft);
  color: var(--e-violet);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0.3rem 0.65rem;
  border-radius: 8px;
  border: 1px solid var(--e-border);
  white-space: nowrap;
}
.tgecet-closing-rank {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--e-indigo);
  letter-spacing: -0.02em;
  text-align: right;
}
.tgecet-closing-rank .rank-label {
  display: block;
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--e-text-light);
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tgecet-expand-btn {
  color: var(--e-text-light);
  font-size: 1rem;
  transition: transform 0.25s;
  line-height: 1;
}
.tgecet-result-card.expanded .tgecet-expand-btn { transform: rotate(180deg); color: var(--e-violet); }

.tgecet-card-detail {
  border-top: 1px solid #eafaf8;
  padding: 1rem 1rem 1.1rem;
  display: none;
  animation: slideDown 0.2s ease;
}
.tgecet-result-card.expanded .tgecet-card-detail { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tgecet-detail-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
@media (min-width: 480px) { .tgecet-detail-grid { grid-template-columns: 1fr 1fr; } }

.tgecet-detail-field label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--e-text-light);
  display: block;
  margin-bottom: 0.2rem;
}
.tgecet-detail-field span {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--e-text);
  line-height: 1.35;
}

.tgecet-seat-cat-tag {
  display: inline-flex;
  align-items: center;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.25rem 0.7rem;
  border-radius: 99px;
  background: #e9fefc;
  color: var(--e-violet);
  letter-spacing: 0.03em;
}

.tgecet-detail-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}
.tgecet-view-college-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--e-violet);
  background: var(--e-surface-soft);
  border: 1.5px solid var(--e-border);
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
}
.tgecet-view-college-btn:hover { background: #e9fefc; border-color: var(--e-violet); }

/* ── RESPONSIVE SHOW/HIDE ───────────────────────────────── */
@media (min-width: 768px) {
  .tgecet-show-mobile { display: none !important; }
  .tgecet-show-desktop { display: block !important; }
}
@media (max-width: 767px) {
  .tgecet-show-mobile { display: flex !important; }
  .tgecet-show-desktop { display: none !important; }
}

/* ── EMPTY / LOADING STATES ─────────────────────────────── */
.tgecet-state-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1rem;
  text-align: center;
  color: var(--e-text-muted);
  gap: 0.75rem;
}
.tgecet-state-box .state-icon { font-size: 2.5rem; }
.tgecet-state-box p { font-size: 0.95rem; margin: 0; }

.tgecet-spinner {
  width: 40px; height: 40px;
  border: 3px solid #E5E7EB;
  border-top-color: var(--e-violet);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PAGINATION ─────────────────────────────────────────── */
.tgecet-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
.tgecet-page-btn {
  width: 36px; height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid #E5E7EB;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--e-text-muted);
  cursor: pointer;
  background: #fff;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.tgecet-page-btn:hover, .tgecet-page-btn.active {
  background: var(--e-indigo);
  border-color: var(--e-indigo);
  color: #fff;
}
.tgecet-page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── CONTENT SECTION ────────────────────────────────────── */
.tgecet-content { padding: 3rem 0 2rem; background: #fff; }

.tgecet-section-label {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--e-violet);
  margin-bottom: 0.5rem;
}
.tgecet-section-h2 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
  color: var(--e-indigo);
  line-height: 1.25;
  margin: 0 0 1rem;
  letter-spacing: -0.02em;
}
.tgecet-section-h3 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--e-indigo);
  margin: 0 0 0.5rem;
}
.tgecet-section-desc {

/*
 * ── Scroll-to-top: ALL tokens scoped to the component ─────────────────────
 *    No :root — safe to include this file multiple times without polluting
 *    any other stylesheet on the page.
 * ──────────────────────────────────────────────────────────────────────────
 */

.edu-scroll-to-top {

    /* Token layer — scoped here, naturally inherited by child elements */
    --_bg:            #ffffff;
    --_bg-hover:      #00b3a1;
    --_icon-color:    #444444;
    --_icon-hover:    #ffffff;
    --_size:          44px;
    --_shadow:        0 2px 8px rgba(0, 0, 0, 0.18);
    --_shadow-hover:  0 6px 18px rgba(0,179,161, 0.32);
    --_dur:           0.28s;
    --_spring:        cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    position:         fixed;
    bottom:           24px;
    right:            24px;
    width:            var(--_size);
    height:           var(--_size);
    padding:          0;
    border:           none;
    border-radius:    50%;
    cursor:           pointer;
    overflow:         hidden;               /* clip the ripple */
    z-index:          1000;

    display:          flex;
    align-items:      center;
    justify-content:  center;

    background-color: var(--_bg);
    box-shadow:       var(--_shadow);
    color:            inherit;              /* don't bleed into surrounding text */

    /* Hidden by default — fade + spring-scale in when .visible is added */
    opacity:          0;
    pointer-events:   none;
    transform:        translateY(14px) scale(0.88);
    transition:
        opacity          var(--_dur) ease,
        transform        var(--_dur) var(--_spring),
        background-color var(--_dur) ease,
        box-shadow       var(--_dur) ease;
}

/* ── Visible state ───────────────────────────────────────────────────────── */

.edu-scroll-to-top.visible {
    opacity:        1;
    pointer-events: auto;
    transform:      translateY(0) scale(1);
}

/* ── Hover ───────────────────────────────────────────────────────────────── */

.edu-scroll-to-top:hover {
    background-color: var(--_bg-hover);
    box-shadow:       var(--_shadow-hover);
    transform:        translateY(-3px) scale(1.06);
}

/* ── Active / pressed ────────────────────────────────────────────────────── */

.edu-scroll-to-top:active {
    transform:        translateY(0) scale(0.95);
    box-shadow:       var(--_shadow);
    transition-duration: 0.08s;
}

/* ── Keyboard focus ──────────────────────────────────────────────────────── */

.edu-scroll-to-top:focus-visible {
    outline:        3px solid var(--_bg-hover);
    outline-offset: 3px;
}

/* ── CSS chevron (no emoji, consistent cross-browser) ────────────────────── */

.edu-scroll-icon {
    display:      block;
    flex-shrink:  0;
    width:        10px;
    height:       10px;
    border-left:  2.5px solid var(--_icon-color);
    border-top:   2.5px solid var(--_icon-color);
    border-radius: 1px;
    transform:    rotate(45deg) translate(2px, 2px);
    transition:   border-color var(--_dur) ease;
}

.edu-scroll-to-top:hover .edu-scroll-icon {
    border-color: var(--_icon-hover);
}

/* ── Click ripple ────────────────────────────────────────────────────────── */

.edu-scroll-ripple {
    position:      absolute;
    border-radius: 50%;
    background:    rgba(255, 255, 255, 0.38);
    pointer-events:none;
    transform:     scale(0);
    animation:     edu-ripple-grow 0.52s linear forwards;
}

@keyframes edu-ripple-grow {
    to { transform: scale(4); opacity: 0; }
}

/* ── Responsive ──────────────────────────────────────────────────────────── */

@media (max-width: 768px) {
    .edu-scroll-to-top {
        --_size: 38px;
        bottom: 16px;
        right:  16px;
    }

    .edu-scroll-icon {
        width:  9px;
        height: 9px;
    }
}

/* ── Honour reduced-motion preferences ───────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
    .edu-scroll-to-top {
        transition:       opacity 0.15s ease;
        /* freeze all transforms to a single state so nothing bounces */
        transform:        none !important;
    }

    .edu-scroll-to-top.visible {
        transform:  none !important;
    }

    .edu-scroll-ripple {
        display: none; /* skip the ripple for motion-sensitive users */
    }
}

    // ── Init: safe whether DOM has loaded or not ──────────────────────────────
    function init() {

        var btn = document.getElementById('eduScroll2Top');
        if (!btn) return; // silently bail — DOM element missing

        var THRESHOLD = 300;  // px scrolled before button appears
        var ticking   = false;

        // ── Show / hide — rAF-throttled for smooth 60 fps handling ────────────
        function updateVisibility() {
            btn.classList.toggle('visible', window.scrollY > THRESHOLD);
            ticking = false;
        }

        window.addEventListener('scroll', function () {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(updateVisibility);
        }, { passive: true });

        // ── Smooth scroll to top ──────────────────────────────────────────────
        btn.addEventListener('click', function (e) {
            spawnRipple(e);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── Ripple helper ─────────────────────────────────────────────────────
        function spawnRipple(e) {
            var el     = btn;
            var d      = Math.max(el.offsetWidth, el.offsetHeight);
            var rect   = el.getBoundingClientRect();
            var ripple = document.createElement('span');

            ripple.className  = 'edu-scroll-ripple';
            ripple.style.cssText = [
                'width:'  + d + 'px',
                'height:' + d + 'px',
                'left:'   + (e.clientX - rect.left  - d / 2) + 'px',
                'top:'    + (e.clientY - rect.top   - d / 2) + 'px'
            ].join(';');

            el.appendChild(ripple);
            ripple.addEventListener('animationend', function () { ripple.remove(); });

         *   2. window.shareButtonConfig (legacy JS approach)

            text:  btn.dataset.shareText  || legacy.text  || (meta ? meta.content : '') || '',

        };

        function share() {
            if (navigator.share) {
                navigator.share({ title: cfg.title, text: cfg.text, url: cfg.url })

                        // AbortError = user cancelled the native sheet — not an error

            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(cfg.url)
                    .then(function ()  { feedback(true,  true); })
                    .catch(function () { legacyFallback(); });

            ta.value = cfg.url;
            ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0;';
            ta.setAttribute('readonly', '');
            document.body.appendChild(ta);
            ta.focus();
            ta.select();

            try { ok = document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);
