    /* Floating Action Button (FAB) - Vertical Design */
    .college-directory-main .floating-filter-btn {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      width: 50px;
      height: 120px;
      border-radius: 25px 0 0 25px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      box-shadow: -4px 0 25px rgba(26,128,118, 0.3);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1.2rem;
      animation: college-directory-float 3s ease-in-out infinite;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .college-directory-main .floating-filter-btn .filter-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      transform: rotate(90deg);
      white-space: nowrap;
      margin-top: 4px;
      line-height: 1;
      writing-mode: initial;
      text-orientation: initial;
    }

    /* @keyframes should remain global as it's referenced by scoped selectors */
    @keyframes college-directory-float {

      0%,
      100% {
        transform: translateY(-50%) translateX(0px);
      }

      50% {
        transform: translateY(-50%) translateX(-5px);
      }
    }

    .college-directory-main .floating-filter-btn:hover {
      transform: translateY(-50%) translateX(-8px);
      box-shadow: -8px 0 35px rgba(26,128,118, 0.4);
      animation: none;
      width: 55px;
    }

    .college-directory-main .floating-filter-btn:active,
    .college-directory-main .floating-filter-btn:focus {
      outline: 3px solid rgba(26,128,118, 0.3);
      outline-offset: 2px;
    }

    /* Touch devices - enhance tap feedback */
    @media (hover: none) and (pointer: coarse) {
      .college-directory-main .floating-filter-btn:active {
        transform: translateY(-50%) translateX(-5px) scale(0.95);
        background: linear-gradient(135deg, #1a8076 0%, #26d0bf 100%);
      }
    }

    .college-directory-main .floating-filter-btn:active {
      transform: translateY(-50%) translateX(-3px) scale(0.98);
    }

    /* Filter count badge */
    .college-directory-main .floating-filter-btn::after {
      content: attr(data-filter-count);
      position: absolute;
      top: 10px;
      left: -12px;
      background: #ff4757;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid white;
    }

    .college-directory-main .floating-filter-btn[data-filter-count]:not([data-filter-count="0"])::after {
      opacity: 1;
      transform: scale(1);
    }

#ev-footer {
  --evf-bg:      #072b27;
  --evf-bg2:     #0d4b45;
  --evf-text:    rgba(255,255,255,.5);
  --evf-head:    #ffffff;
  --evf-link:    rgba(255,255,255,.55);
  --evf-accent:  #00c6b8;
  --evf-gold:    #f59e0b;
  --evf-border:  rgba(255,255,255,.07);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
 
#ev-footer .evf-wrap {
  background: var(--evf-bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% 0%, rgba(0,198,184,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5% 100%, rgba(14,138,126,.25) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
  padding: 5rem 0 0;
}
 
/* Decorative line at top */
#ev-footer .evf-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,198,184,.4), rgba(14,138,126,.4), transparent);
}
 
/* Top grid */
#ev-footer .evf-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  position: relative;
  z-index: 1;
}
@media (max-width: 991px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
}
@media (max-width: 575px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr; gap: 1.75rem; }
}
 
/* Brand */
#ev-footer .evf-brand {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Sora', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--evf-head);
  text-decoration: none;
  margin-bottom: .75rem;
  transition: opacity .2s;
}
#ev-footer .evf-brand:hover { opacity: .85; }
#ev-footer .evf-brand-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--evf-accent), #08b2a1);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
 
#ev-footer .evf-tagline {
  font-size: .9rem; line-height: 1.7;
  color: var(--evf-text);
  margin-bottom: 1.5rem;
  max-width: 280px;
}
 
/* Trust badge */
#ev-footer .evf-trust {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--evf-border);
  border-radius: 100px;
  padding: .5rem 1.1rem;
  text-decoration: none;
  font-size: .8rem; font-weight: 600;
  color: var(--evf-text);
  transition: border-color .2s, color .2s, background .2s;
  margin-bottom: .75rem;
}
#ev-footer .evf-trust:hover {
  border-color: var(--evf-accent);
  color: var(--evf-accent);
  background: rgba(0,198,184,.05);
}
#ev-footer .evf-trust-dot {
  width: 8px; height: 8px;
  background: #10b981;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.2);
  animation: evfPulse 2.5s infinite;
}
@keyframes evfPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.2); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,.08); }
}
 
/* Column heading */
#ev-footer .evf-col-head {

    bottom:           24px;
    right:            24px;

    height:           var(--_size);
    padding:          0;
    border:           none;
    border-radius:    50%;
    cursor:           pointer;
    overflow:         hidden;               /* clip the ripple */

    align-items:      center;
    justify-content:  center;

    opacity:        1;
    pointer-events: auto;
    transform:      translateY(0) scale(1);
}

/* ── Hover ───────────────────────────────────────────────────────────────── */

.edu-scroll-to-top:hover {
    background-color: var(--_bg-hover);
    box-shadow:       var(--_shadow-hover);
    transform:        translateY(-3px) scale(1.06);
}

/* ── Active / pressed ────────────────────────────────────────────────────── */

.edu-scroll-to-top:active {
    transform:        translateY(0) scale(0.95);
    box-shadow:       var(--_shadow);
    transition-duration: 0.08s;
}

/* ── Keyboard focus ──────────────────────────────────────────────────────── */

    height:       10px;

    border-top:   2.5px solid var(--_icon-color);

}

    function init() {

        var btn = document.getElementById('eduScroll2Top');
        if (!btn) return; // silently bail — DOM element missing

        var THRESHOLD = 300;  // px scrolled before button appears
        var ticking   = false;

        // ── Show / hide — rAF-throttled for smooth 60 fps handling ────────────
        function updateVisibility() {
            btn.classList.toggle('visible', window.scrollY > THRESHOLD);
            ticking = false;
        }

        window.addEventListener('scroll', function () {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(updateVisibility);
        }, { passive: true });

        // ── Smooth scroll to top ──────────────────────────────────────────────
        btn.addEventListener('click', function (e) {
            spawnRipple(e);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── Ripple helper ─────────────────────────────────────────────────────
        function spawnRipple(e) {
            var el     = btn;
            var d      = Math.max(el.offsetWidth, el.offsetHeight);
            var rect   = el.getBoundingClientRect();
            var ripple = document.createElement('span');

            ripple.className  = 'edu-scroll-ripple';
            ripple.style.cssText = [
                'width:'  + d + 'px',
                'height:' + d + 'px',
                'left:'   + (e.clientX - rect.left  - d / 2) + 'px',
                'top:'    + (e.clientY - rect.top   - d / 2) + 'px'
            ].join(';');

            ripple.addEventListener('animationend', function () { ripple.remove(); });

         *   1. data-share-* attributes on the <button> (set from PHP variables)
         *   2. window.shareButtonConfig (legacy JS approach)

        var legacy = window.shareButtonConfig || {};
        var meta   = document.querySelector('meta[name="description"]');

        var cfg = {
            title: btn.dataset.shareTitle || legacy.title || document.title,
            text:  btn.dataset.shareText  || legacy.text  || (meta ? meta.content : '') || '',
            url:   btn.dataset.shareUrl   || legacy.url   || window.location.href

        function share() {
            if (navigator.share) {
                navigator.share({ title: cfg.title, text: cfg.text, url: cfg.url })
                    .then(function ()    { feedback(true,  false); })
                    .catch(function (err) {
                        // AbortError = user cancelled the native sheet — not an error
                        if (err.name !== 'AbortError') { clipboardFallback(); }
                    });
            } else {
                clipboardFallback();
            }
        }

        function clipboardFallback() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(cfg.url)
                    .then(function ()  { feedback(true,  true); })
                    .catch(function () { legacyFallback(); });
            } else {
                legacyFallback();
            }

         * execCommand('copy') is deprecated but remains the only option in
         * very old browsers and non-secure contexts (http://). Using <textarea>
         * rather than <input> avoids iOS selection issues with long URLs.
         */
        function legacyFallback() {
            var ta = document.createElement('textarea');
            ta.value = cfg.url;
            ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0;';
            ta.setAttribute('readonly', '');
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            var ok = false;
            try { ok = document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);
            feedback(ok, true);

        var _resetTimer = null;

        function feedback(success, wasCopy) {
            // Clear any in-flight reset so rapid clicks don't conflict
            clearTimeout(_resetTimer);

            // Remove existing state classes first, then force a reflow so the
            // browser registers the removal before we add the new class —
            // this restarts the CSS @keyframes animation cleanly.
            btn.classList.remove('ev-success', 'ev-error');
            void btn.offsetWidth; // intentional synchronous reflow

            btn.classList.add(success ? 'ev-success' : 'ev-error');

                success
                    ? (wasCopy ? 'Link copied to clipboard!' : 'Shared successfully!')
                    : 'Could not share. Please copy the URL manually.'

                btn.classList.remove('ev-success', 'ev-error');

        var _hideTimer  = null;
