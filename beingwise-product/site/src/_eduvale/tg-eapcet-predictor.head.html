/* --- Design tokens --- */
#ep {
    --bg:        #f5f4f0;
    --surface:   #ffffff;
    --surface-2: #f9fafb;
    --border:    #e5e7eb;
    --border-2:  #d1d5db;

    --accent:    #d97706;
    --accent-h:  #b45309;
    --accent-bg: #fffbeb;
    --accent-bd: #fde68a;
    --accent-text:#92400e;

    --indigo:    #4f46e5;
    --indigo-bg: #eef2ff;
    --indigo-bd: #c7d2fe;
    --indigo-txt:#3730a3;

    --green:     #16a34a;
    --green-bg:  #f0fdf4;
    --green-bd:  #bbf7d0;
    --green-txt: #14532d;

    --blue:      #2563eb;
    --blue-bg:   #eff6ff;
    --blue-bd:   #bfdbfe;
    --blue-txt:  #1e3a8a;

    --teal:      #0d9488;
    --teal-bg:   #f0fdfa;
    --teal-bd:   #99f6e4;
    --teal-txt:  #134e4a;

    --red-bg:    #fef2f2;
    --red-txt:   #991b1b;

    --text:      #0f172a;
    --text-2:    #475569;
    --text-3:    #94a3b8;

    --r-sm:      6px;
    --r:         10px;
    --r-lg:      14px;
    --r-xl:      18px;

    --font:      'Inter', system-ui, -apple-system, sans-serif;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 2px 8px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
}

/* --- Base reset inside scope --- */
#ep *, #ep *::before, #ep *::after { box-sizing: border-box; }
#ep { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }
#ep h1,#ep h2,#ep h3,#ep h4,#ep h5,#ep h6 { line-height: 1.2; color: var(--text); margin: 0; padding: 0; }
#ep p { margin: 0; padding: 0; }
#ep a { color: var(--accent); text-decoration: none; }
#ep a:hover { color: var(--accent-h); }

/* --- Layout containers --- */
#ep .ep-container { max-width: 1140px; margin: 0 auto; padding: 0 16px; }
#ep .ep-section { padding: 36px 0; border-bottom: 1px solid var(--border); }
#ep .ep-section:last-child { border-bottom: none; }

/* ============================================================
   ANNOUNCE STRIP
   ============================================================ */
#ep .ann-strip {
    background: #0f172a;
    color: #f1f5f9;
    font-size: 12.5px;
    font-weight: 500;
    text-align: center;
    padding: 8px 16px;
    letter-spacing: .01em;
}
#ep .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    animation: ep-pulse 2s infinite;
}
@keyframes ep-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.5)} }

/* ============================================================
   HERO
   ============================================================ */
#ep .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 34px 0 38px;
}
#ep .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-bd);
    color: var(--accent-text);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    padding: 4px 11px;
    border-radius: 100px;
    margin-bottom: 11px;
}
#ep .hero-badge .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: ep-pulse 2s infinite;
}
#ep .hero-h1 {
    font-size: clamp(1.75rem, 4vw, 2.7rem);
    font-weight: 800;
    color: var(--text);
    letter-spacing: -.03em;
    line-height: 1.1;
    margin-bottom: 8px;
}
#ep .hero-h1 .hi { color: var(--accent); }
#ep .hero-sub { font-size: 14px; color: var(--text-2); margin-bottom: 3px; }
#ep .hero-pills { display: flex; flex-wrap: wrap; gap: 5px 16px; margin-top: 14px; }
#ep .hero-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-2); font-weight: 500;
}
#ep .hero-pill i { color: var(--accent); font-size: 13px; }

/* ============================================================
   PREDICTOR CARD
   ============================================================ */
#ep .pred-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 22px 22px 18px;
    box-shadow: var(--shadow);
    position: relative;
}
#ep .pred-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4f46e5 0%, #d97706 50%, #0d9488 100%);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
}
#ep .pred-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 16px;
}
#ep .pred-head .pdot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
#ep .pred-head .phint { font-size: 11px; font-weight: 400; color: var(--text-3); margin-left: auto; }

/* Form labels */
#ep .f-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 5px;
    display: block;
}
#ep .f-opt { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-3); }

/* Form controls */
#ep .form-control,
#ep .form-select {
    background: var(--surface-2) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: var(--r-sm) !important;
    font-size: 13.5px !important;
    font-family: var(--font) !important;
    padding: 9px 11px !important;
    height: auto !important;
    transition: border-color .2s, box-shadow .2s !important;
}
#ep .form-control:focus,
#ep .form-select:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(217,119,6,.12) !important;
    background: var(--surface) !important;
    outline: none !important;
    color: var(--text) !important;
}
#ep .form-control::placeholder { color: var(--text-3) !important; }
#ep .form-select option { background: var(--surface); color: var(--text); }

/* Tom Select — light theme */
#ep .ts-wrapper .ts-control {
    background: var(--surface-2) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: var(--r-sm) !important;
    font-size: 13.5px !important;
    min-height: 40px !important;
    padding: 5px 9px !important;
    box-shadow: none !important;
}
#ep .ts-wrapper.focus .ts-control {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(217,119,6,.12) !important;
}
#ep .ts-wrapper .ts-control .item {
    background: var(--accent-bg) !important;
    border: 1px solid var(--accent-bd) !important;
    color: var(--accent-text) !important;
    font-size: 12px !important;
    border-radius: 5px !important;
}
#ep .ts-wrapper .ts-dropdown {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: var(--r-sm) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,.1) !important;
}
#ep .ts-wrapper .ts-dropdown .option { padding: 8px 12px !important; font-size: 13px !important; color: var(--text-2) !important; }
#ep .ts-wrapper .ts-dropdown .option:hover,
#ep .ts-wrapper .ts-dropdown .option.active { background: var(--accent-bg) !important; color: var(--text) !important; }
#ep .ts-wrapper .ts-dropdown input {
    background: var(--surface-2) !important; color: var(--text) !important;
    border-bottom: 1px solid var(--border) !important; padding: 8px 12px !important; font-size: 13px !important;
}

/* Submit button */
#ep .btn-predict {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r-sm);
    font-family: var(--font);
    font-size: 14.5px;
    font-weight: 700;
    padding: 12px 24px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
    transition: background .2s, transform .15s;
    letter-spacing: .01em;
}
#ep .btn-predict:hover { background: var(--accent-h); transform: translateY(-1px); }
#ep .btn-predict:active { transform: translateY(0); }
#ep .btn-footnote { font-size: 11.5px; color: var(--text-3); text-align: center; margin-top: 9px; }

/* ============================================================
   SECTION HEADER LABELS
   ============================================================ */
#ep .s-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 5px;
}
#ep .s-title {
    font-size: clamp(1.2rem, 2.5vw, 1.55rem);
    font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: -.02em;
}
#ep .s-body { font-size: 14px; color: var(--text-2); max-width: 580px; }

/* ============================================================
   FEATURE CARDS (How It Works + Why BeingWise)
   ============================================================ */
#ep .feat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px;
    height: 100%;
    transition: border-color .2s, box-shadow .2s;
}
#ep .feat-card:hover { border-color: var(--border-2); box-shadow: var(--shadow); }
#ep .feat-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 11px;
}
#ep .fi-or { background: var(--accent-bg); color: var(--accent); }
#ep .fi-bl { background: var(--indigo-bg); color: var(--indigo); }
#ep .fi-te { background: var(--teal-bg); color: var(--teal); }
#ep .fi-gr { background: var(--green-bg); color: var(--green); }
#ep .feat-card h3 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
#ep .feat-card p  { font-size: 13px; color: var(--text-2); margin: 0; line-height: 1.6; }

/* ============================================================
   TOP COLLEGES
   ============================================================ */
#ep .coll-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
    gap: 8px;
}
#ep .coll-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 13px;
    display: flex;
    gap: 11px;
    align-items: flex-start;
    transition: border-color .18s, box-shadow .18s;
}
#ep .coll-card:hover { border-color: var(--border-2); box-shadow: var(--shadow-sm); }
#ep .coll-num {
    min-width: 27px; height: 27px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text-2);
    flex-shrink: 0;
}
#ep .coll-num.gold { background: #fef3c7; border-color: #fde68a; color: #92400e; }
#ep .coll-code {
    font-size: 10px; font-weight: 700; letter-spacing: .07em;
    color: var(--accent-text); background: var(--accent-bg);
    border: 1px solid var(--accent-bd);
    border-radius: 4px; padding: 1px 6px;
    display: inline-block; margin-bottom: 4px;
}
#ep .coll-name { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 5px; }
#ep .coll-tags { display: flex; flex-wrap: wrap; gap: 3px; }
#ep .ctag {
    font-size: 10.5px; padding: 2px 7px; border-radius: 4px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 3px;
}
#ep .ctag.loc  { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
#ep .ctag.estd { background: var(--blue-bg);   color: var(--blue-txt); }
#ep .ctag.aff  { background: var(--green-bg);  color: var(--green-txt); }

#ep .coll-footer {
    margin-top: 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
}
#ep .coll-note { font-size: 11.5px; color: var(--text-3); }
#ep .btn-all {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--accent-text);
    background: var(--accent-bg);
    border: 1px solid var(--accent-bd);
    border-radius: var(--r-sm);
    padding: 8px 15px;
    text-decoration: none;
    transition: background .18s;
}
#ep .btn-all:hover { background: #fef3c7; border-color: #fcd34d; color: var(--accent-h); }

/* ============================================================
   BRANCH GRID
   ============================================================ */
#ep .branch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
}
#ep .branch-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 13px 14px;
    transition: border-color .2s;
}
#ep .branch-item:hover { border-color: var(--accent-bd); }
#ep .b-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
#ep .b-code { font-size: 11px; color: var(--text-3); }
#ep .b-rank { font-size: 11.5px; font-weight: 700; color: var(--accent); margin-top: 7px; display: flex; align-items: center; gap: 4px; }

/* Warning box */
#ep .warn-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: var(--r-sm);
    padding: 13px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 13.5px;
    color: #78350f;
    margin-top: 16px;
}
#ep .warn-box i { color: #d97706; font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ============================================================
   RESERVATION TABLE
   ============================================================ */
#ep .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 18px;
    margin-bottom: 10px;
}
#ep .info-card .ic-title {
    display: flex; align-items: center; gap: 7px;
    font-size: 13.5px; font-weight: 700; color: var(--text);
    margin-bottom: 5px;
}
#ep .info-card .ic-title i { color: var(--indigo); }
#ep .info-card p { font-size: 13.5px; color: var(--text-2); }

#ep .ep-table-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
#ep .ep-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
#ep .ep-table thead th {
    background: var(--surface-2);
    color: var(--text-3);
    font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 10px 13px;
    border: 1px solid var(--border);
    white-space: nowrap;
}
#ep .ep-table tbody td {
    padding: 9px 13px;
    border: 1px solid var(--border);
    color: var(--text-2);
    vertical-align: middle;
}
#ep .ep-table tbody tr:nth-child(even) td { background: var(--surface-2); }
#ep .ep-table tbody tr:hover td { background: var(--accent-bg); }
#ep .ep-table .strong { font-weight: 700; color: var(--text); }

#ep .cat-badge {
    font-size: 11.5px; font-weight: 700;
    padding: 2px 9px; border-radius: 5px; display: inline-block;
}
#ep .cat-oc  { background: var(--indigo-bg); color: var(--indigo-txt); }
#ep .cat-bc  { background: var(--teal-bg);   color: var(--teal-txt); }
#ep .cat-sc  { background: var(--accent-bg); color: var(--accent-text); }
#ep .cat-st  { background: var(--green-bg);  color: var(--green-txt); }
#ep .cat-ews { background: var(--red-bg);    color: var(--red-txt); }

/* ============================================================
   COUNSELLING TIMELINE
   ============================================================ */
#ep .timeline { position: relative; padding-left: 24px; }
#ep .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 5px; bottom: 5px;
    width: 2px; background: var(--border); border-radius: 2px;
}
#ep .tl-item { position: relative; margin-bottom: 18px; }
#ep .tl-item:last-child { margin-bottom: 0; }
#ep .tl-dot {
    position: absolute; left: -20px; top: 4px;
    width: 10px; height: 10px;
    background: var(--accent); border: 2px solid var(--bg); border-radius: 50%;
}
#ep .tl-month { font-size: 10.5px; font-weight: 700; color: var(--accent); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 1px; }
#ep .tl-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
#ep .tl-body  { font-size: 13px; color: var(--text-2); }

/* ============================================================
   DOCUMENTS CHECKLIST
   ============================================================ */
#ep .check-list { list-style: none; padding: 0; margin: 0; }
#ep .check-list li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    font-size: 14px; color: var(--text-2);
    border-bottom: 1px solid var(--border);
}
#ep .check-list li:last-child { border-bottom: none; }
#ep .check-list li i { color: var(--green); font-size: 14px; margin-top: 2px; flex-shrink: 0; }

/* ============================================================
   RESERVATION CTA BANNER
   ============================================================ */
#ep .cta-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 22px 24px;
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: center; justify-content: space-between;
}
#ep .cta-banner h3 { font-size: 16.5px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
#ep .cta-banner p  { font-size: 13.5px; color: var(--text-2); }
#ep .btn-cta {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13.5px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: var(--r-sm);
    padding: 10px 20px; text-decoration: none; white-space: nowrap;
    transition: background .2s;
}
#ep .btn-cta:hover { background: var(--accent-h); color: #fff; }

/* ============================================================
   FAQ ACCORDION
   ============================================================ */
#ep .faq-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    margin-bottom: 6px;
    overflow: hidden;
}
#ep .faq-q {
    width: 100%; background: none; border: none; text-align: left;
    padding: 13px 16px;
    font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text);
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
#ep .faq-q:hover { color: var(--accent); }
#ep .faq-icon {
    min-width: 20px; height: 20px; border-radius: 50%;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-3);
    transition: background .2s, transform .25s;
    flex-shrink: 0;
}
#ep .faq-item.open .faq-icon { background: var(--accent); border-color: var(--accent); color: #fff; transform: rotate(45deg); }
#ep .faq-a {
    max-height: 0; overflow: hidden;
    transition: max-height .35s ease, padding .25s;
    padding: 0 16px;
    font-size: 13.5px; color: var(--text-2); line-height: 1.7;
}
#ep .faq-item.open .faq-a { max-height: 400px; padding: 0 16px 14px; }

/* ============================================================
   ABOUT / TRUST
   ============================================================ */
#ep .about-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 24px 26px;
}
#ep .about-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 15.5px; font-weight: 700; color: var(--text);
    margin-bottom: 10px;
}
#ep .about-title i { color: var(--accent); }
#ep .about-box p { font-size: 14px; color: var(--text-2); margin-bottom: 6px; }
#ep .ab-stat-col { text-align: center; }
#ep .ab-stat { margin-bottom: 14px; }
#ep .ab-stat .num { display: block; font-size: 21px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 3px; }
#ep .ab-stat .lbl { font-size: 12px; color: var(--text-3); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 991px) {
    #ep .hero { padding: 24px 0 28px; }
    #ep .pred-card { padding: 18px 14px 16px; }
    #ep .ep-section { padding: 30px 0; }
}
@media (max-width: 767px) {
    #ep .hero-h1 { font-size: 1.65rem; }
    #ep .coll-grid { grid-template-columns: 1fr; }
    #ep .branch-grid { grid-template-columns: 1fr 1fr; }
    #ep .cta-banner { flex-direction: column; align-items: flex-start; }
    #ep .coll-footer { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
    #ep .branch-grid { grid-template-columns: 1fr; }
    #ep .btn-predict { font-size: 14px; }
    #ep .pred-head .phint { display: none; }
}


@keyframes ep-spin { to { transform: rotate(360deg); } }


#ev-footer {
  --evf-bg:      #070f2b;
  --evf-bg2:     #0d1b4b;
  --evf-text:    rgba(255,255,255,.5);
  --evf-head:    #ffffff;
  --evf-link:    rgba(255,255,255,.55);
  --evf-accent:  #00c6b8;
  --evf-gold:    #f59e0b;
  --evf-border:  rgba(255,255,255,.07);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
 
#ev-footer .evf-wrap {
  background: var(--evf-bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 85% 0%, rgba(0,198,184,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5% 100%, rgba(14,79,138,.25) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
  padding: 5rem 0 0;
}
 
/* Decorative line at top */
#ev-footer .evf-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,198,184,.4), rgba(14,79,138,.4), transparent);
}
 
/* Top grid */
#ev-footer .evf-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  position: relative;
  z-index: 1;
}
@media (max-width: 991px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
}
@media (max-width: 575px) {
  #ev-footer .evf-grid { grid-template-columns: 1fr; gap: 1.75rem; }
}
 
/* Brand */
#ev-footer .evf-brand {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Sora', sans-serif;
  font-size: 1.55rem; font-weight: 800;
  color: var(--evf-head);
  text-decoration: none;
  margin-bottom: .75rem;
  transition: opacity .2s;
}
#ev-footer .evf-brand:hover { opacity: .85; }
#ev-footer .evf-brand-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--evf-accent), #0891b2);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
 
#ev-footer .evf-tagline {
  font-size: .9rem; line-height: 1.7;
  color: var(--evf-text);
  margin-bottom: 1.5rem;
  max-width: 280px;
}
 
/* Trust badge */
#ev-footer .evf-trust {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--evf-border);
  border-radius: 100px;
  padding: .5rem 1.1rem;
  text-decoration: none;
  font-size: .8rem; font-weight: 600;
  color: var(--evf-text);
  transition: border-color .2s, color .2s, background .2s;
  margin-bottom: .75rem;
}
#ev-footer .evf-trust:hover {
  border-color: var(--evf-accent);
  color: var(--evf-accent);
  background: rgba(0,198,184,.05);
}
#ev-footer .evf-trust-dot {
  width: 8px; height: 8px;

/*
 * ── Scroll-to-top: ALL tokens scoped to the component ─────────────────────
 *    No :root — safe to include this file multiple times without polluting
 *    any other stylesheet on the page.
 * ──────────────────────────────────────────────────────────────────────────
 */

.edu-scroll-to-top {

    /* Token layer — scoped here, naturally inherited by child elements */
    --_bg:            #ffffff;
    --_bg-hover:      #0056b3;
    --_icon-color:    #444444;
    --_icon-hover:    #ffffff;
    --_size:          44px;
    --_shadow:        0 2px 8px rgba(0, 0, 0, 0.18);
    --_shadow-hover:  0 6px 18px rgba(0, 86, 179, 0.32);
    --_dur:           0.28s;
    --_spring:        cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    position:         fixed;
    bottom:           24px;
    right:            24px;
    width:            var(--_size);
    height:           var(--_size);
    padding:          0;
    border:           none;
    border-radius:    50%;
    cursor:           pointer;
    overflow:         hidden;               /* clip the ripple */
    z-index:          1000;

    display:          flex;
    align-items:      center;
    justify-content:  center;

    background-color: var(--_bg);
    box-shadow:       var(--_shadow);
    color:            inherit;              /* don't bleed into surrounding text */

    /* Hidden by default — fade + spring-scale in when .visible is added */
    opacity:          0;
    pointer-events:   none;
    transform:        translateY(14px) scale(0.88);
    transition:
        opacity          var(--_dur) ease,
        transform        var(--_dur) var(--_spring),
        background-color var(--_dur) ease,
        box-shadow       var(--_dur) ease;
}

/* ── Visible state ───────────────────────────────────────────────────────── */

.edu-scroll-to-top.visible {
    opacity:        1;
    pointer-events: auto;
    transform:      translateY(0) scale(1);
}

/* ── Hover ───────────────────────────────────────────────────────────────── */

.edu-scroll-to-top:hover {
    background-color: var(--_bg-hover);
    box-shadow:       var(--_shadow-hover);
    transform:        translateY(-3px) scale(1.06);
}

/* ── Active / pressed ────────────────────────────────────────────────────── */

.edu-scroll-to-top:active {
    transform:        translateY(0) scale(0.95);
    box-shadow:       var(--_shadow);
    transition-duration: 0.08s;
}

/* ── Keyboard focus ──────────────────────────────────────────────────────── */

.edu-scroll-to-top:focus-visible {
    outline:        3px solid var(--_bg-hover);
    outline-offset: 3px;
}

/* ── CSS chevron (no emoji, consistent cross-browser) ────────────────────── */

.edu-scroll-icon {
    display:      block;
    flex-shrink:  0;
    width:        10px;
    height:       10px;
    border-left:  2.5px solid var(--_icon-color);
    border-top:   2.5px solid var(--_icon-color);
    border-radius: 1px;
    transform:    rotate(45deg) translate(2px, 2px);
    transition:   border-color var(--_dur) ease;
}

.edu-scroll-to-top:hover .edu-scroll-icon {
    border-color: var(--_icon-hover);
}

/* ── Click ripple ────────────────────────────────────────────────────────── */

.edu-scroll-ripple {
    position:      absolute;
    border-radius: 50%;
    background:    rgba(255, 255, 255, 0.38);
    pointer-events:none;
    transform:     scale(0);
    animation:     edu-ripple-grow 0.52s linear forwards;
}

@keyframes edu-ripple-grow {
    to { transform: scale(4); opacity: 0; }
}

/* ── Responsive ──────────────────────────────────────────────────────────── */

@media (max-width: 768px) {
    .edu-scroll-to-top {
        --_size: 38px;
        bottom: 16px;
        right:  16px;
    }

    .edu-scroll-icon {
        width:  9px;
        height: 9px;
    }
}

/* ── Honour reduced-motion preferences ───────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
    .edu-scroll-to-top {
        transition:       opacity 0.15s ease;
        /* freeze all transforms to a single state so nothing bounces */
        transform:        none !important;
    }

    .edu-scroll-to-top.visible {
        transform:  none !important;
    }

    .edu-scroll-ripple {
        display: none; /* skip the ripple for motion-sensitive users */
    }
}

            ticking = true;

        // ── Ripple helper ─────────────────────────────────────────────────────

            var d      = Math.max(el.offsetWidth, el.offsetHeight);

                'height:' + d + 'px',
                'left:'   + (e.clientX - rect.left  - d / 2) + 'px',
                'top:'    + (e.clientY - rect.top   - d / 2) + 'px'

        var meta   = document.querySelector('meta[name="description"]');

            title: btn.dataset.shareTitle || legacy.title || document.title,
            text:  btn.dataset.shareText  || legacy.text  || (meta ? meta.content : '') || '',
            url:   btn.dataset.shareUrl   || legacy.url   || window.location.href

                navigator.share({ title: cfg.title, text: cfg.text, url: cfg.url })

                clipboardFallback();
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(cfg.url)
                    .then(function ()  { feedback(true,  true); })
                    .catch(function () { legacyFallback(); });

                legacyFallback();
            }

            var ta = document.createElement('textarea');
            ta.value = cfg.url;
            ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;opacity:0;';
            ta.setAttribute('readonly', '');
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            var ok = false;
            try { ok = document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);

            // Remove existing state classes first, then force a reflow so the

            btn.classList.remove('ev-success', 'ev-error');
